<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purge-Script Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Firebase SDK Compat (optional) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <style>
        :root { 
            --accent-color: #6366f1; /* Indigo default */
            --accent-soft: rgba(99, 102, 241, 0.15); 
        }
        body { 
            font-family: 'Inter', sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        .editor-font { font-family: 'IBM Plex Sans', sans-serif; font-size: 1.05rem; line-height: 1.7; }
        .editor-container { position: relative; min-height: 600px; border-radius: 1.5rem; }
        
        .sync-text { 
            position: absolute; top: 0; left: 0; 
            width: 100%; height: 100%; 
            padding: 30px; 
            white-space: pre-wrap; 
            word-wrap: break-word; 
            overflow-y: auto; 
            border: none; margin: 0; 
            background: transparent; 
        }
        
        #textarea { z-index: 2; outline: none; background: transparent; }
        #highlight-layer { z-index: 1; pointer-events: none; color: transparent !important; }
        
        mark {
            background: none;
            color: inherit;
            border-radius: 4px;
        }
        .show-parasites mark.parasite, .show-parasites mark.focus-active {
            background-color: var(--accent-soft);
            background-image: linear-gradient(var(--accent-color), var(--accent-color));
            background-repeat: no-repeat;
            background-position: 0 100%;
            background-size: 100% 2px;
        }
        .show-repeats mark.repeat {
            background-color: rgba(245, 158, 11, 0.15);
            background-image: linear-gradient(#f59e0b, #f59e0b);
            background-repeat: no-repeat;
            background-position: 0 100%;
            background-size: 100% 2px;
        }
        mark.focus-active { font-weight: 600; }
        
        .sidebar-item { cursor: pointer; transition: all 0.2s; }
        .sidebar-item.active-focus { background-color: var(--accent-color) !important; color: white; }
        .sidebar-item.active-focus span { color: white !important; }

        /* --- STYLES LIGHT MODE (Base) --- */
        body { background-color: #f9fafb; color: #1f2937; }
        .panel-bg { background-color: #ffffff; border-color: #e5e7eb; }
        .text-main { color: #111827; }
        .text-soft { color: #6b7280; }
        .border-color { border-color: #e5e7eb; }
        #textarea { color: #1f2937; }
        .toolbar-group { background: #f3f4f6; border: 1px solid #e5e7eb; }
        .toolbar-btn { color: #4b5563; }
        .toolbar-btn:hover { background: #e5e7eb; }
        .sidebar-item:hover { background-color: #f3f4f6; }
        .sidebar-item-bg { background-color: #f9fafb; }
        .toolbar-btn-special { background: #fee2e2; color: #ef4444; }

        /* --- STYLES DARK MODE (Overrides) --- */
        .dark-mode body { background-color: #111827; color: #f1f5f9; }
        .dark-mode .panel-bg { background-color: #1f2937; border-color: #374151; }
        .dark-mode .text-main { color: #f8fafc; }
        .dark-mode .text-soft { color: #9ca3af; }
        .dark-mode .border-color { border-color: #374151; }
        .dark-mode #textarea { color: #e2e8f0; }
        .dark-mode .toolbar-group { background: #374151; border: 1px solid #4b5563; }
        .dark-mode .toolbar-btn { color: #d1d5db; }
        .dark-mode .toolbar-btn:hover { background: #4b5563; }
        .dark-mode .sidebar-item:hover { background-color: rgba(255,255,255,0.05); }
        .dark-mode .sidebar-item-bg { background-color: #374151; }
        .dark-mode .toolbar-btn-special { background: rgba(239, 68, 68, 0.1); color: #ef4444; }
        
        .theme-btn.active-theme { border: 2px solid white; box-shadow: 0 0 0 2px var(--accent-color); }
    </style>
</head>
<body>

    <div class="max-w-7xl mx-auto px-6 py-10 space-y-8">
        
        <header class="flex items-center justify-between">
            <h1 class="text-3xl font-extrabold text-main tracking-tight">Purge-Script<span style="color: var(--accent-color);">.</span></h1>

            <!-- NOUVEAU : Panneau de contrأ´le des thأ¨mes -->
            <div class="flex items-center gap-2 panel-bg p-2 rounded-full border border-color">
                <div class="flex items-center gap-1.5" id="theme-picker"></div>
                <div class="h-6 w-px bg-gray-200 dark:bg-gray-600 mx-1"></div>
                <button onclick="toggleDarkMode()" class="p-1.5 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors">
                    <svg id="sun-icon" class="w-5 h-5 text-amber-500" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"></path></svg>
                    <svg id="moon-icon" class="w-5 h-5 text-indigo-300 hidden" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
                </button>
            </div>
        </header>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
            <div class="panel-bg p-6 rounded-3xl border border-color">
                <p class="text-soft text-xs font-bold uppercase mb-2 tracking-wider">TICS</p>
                <p id="total-parasites" class="text-4xl font-extrabold" style="color: var(--accent-color);">0</p>
            </div>
            <div class="panel-bg p-6 rounded-3xl border border-color">
                <p class="text-soft text-xs font-bold uppercase mb-2 tracking-wider">Rأ‰Pأ‰TITIONS</p>
                <p id="total-repeats" class="text-4xl font-extrabold text-amber-500 dark:text-amber-400">0</p>
            </div>
            <div class="panel-bg p-6 rounded-3xl border border-color">
                <p class="text-soft text-xs font-bold uppercase mb-2 tracking-wider">TOTAL MOTS</p>
                <p id="total-words" class="text-4xl font-extrabold text-main">0</p>
            </div>
            <div class="panel-bg p-6 rounded-3xl border border-color">
                <p class="text-soft text-xs font-bold uppercase mb-2 tracking-wider">FOCUS ACTIF</p>
                <p id="focus-display" class="text-2xl font-extrabold text-soft truncate">Aucun</p>
            </div>
        </div>

        <div class="flex flex-wrap gap-3 items-center">
            <div class="toolbar-group">
                <button onclick="format('bold')" class="toolbar-btn" title="Gras">B</button>
                <button onclick="format('italic')" class="toolbar-btn" title="Italique">I</button>
                <button onclick="format('underline')" class="toolbar-btn" title="Soulignأ©">U</button>
                <button onclick="format('strikeThrough')" class="toolbar-btn" title="Barrأ©">S</button>
            </div>
            <div class="toolbar-group">
                <button onclick="format('formatBlock', 'h1')" class="toolbar-btn">H1</button>
                <button onclick="format('formatBlock', 'h2')" class="toolbar-btn">H2</button>
                <button onclick="format('formatBlock', 'p')" class="toolbar-btn">P</button>
            </div>
            <div class="toolbar-group">
                <button onclick="format('justifyLeft')" class="toolbar-btn">â«·</button>
                <button onclick="format('justifyCenter')" class="toolbar-btn">م€“</button>
                <button onclick="format('justifyRight')" class="toolbar-btn">â«¸</button>
            </div>
            <div class="toolbar-group">
                <button onclick="format('insertUnorderedList')" class="toolbar-btn">â€¢ List</button>
                <button onclick="format('insertOrderedList')" class="toolbar-btn">1. List</button>
            </div>
            <div class="toolbar-group">
                <button onclick="addLink()" class="toolbar-btn">Link</button>
                <input type="color" onchange="format('foreColor', this.value)" class="w-8 h-8 p-1 border-none cursor-pointer bg-transparent">
            </div>
            <button onclick="format('removeFormat')" class="toolbar-btn toolbar-btn-special">Effacer tout</button>
        </div>
        
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-8">
                <div id="editor-wrapper" class="editor-container panel-bg border border-color overflow-hidden show-parasites show-repeats">
                    <div id="highlight-layer" class="sync-text editor-font"></div>
                    <div id="textarea" class="sync-text editor-font" contenteditable="true" spellcheck="false"></div>
                </div>
            </div>

            <div class="lg:col-span-4 space-y-8">
                <div class="panel-bg p-7 rounded-3xl border border-color">
                    <h2 class="text-sm font-bold tracking-wider text-soft mb-4">TICS</h2>
                    <ul id="word-list" class="space-y-2 text-sm max-h-52 overflow-y-auto pr-2"></ul>
                </div>
                <div class="panel-bg p-7 rounded-3xl border border-color">
                    <h2 class="text-sm font-bold tracking-wider text-soft mb-4">Rأ‰Pأ‰TITIONS</h2>
                    <ul id="repeat-list" class="space-y-2 text-sm max-h-52 overflow-y-auto pr-2"></ul>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "VOTRE_...", authDomain: "...", projectId: "..."};
        //firebase.initializeApp(firebaseConfig);

        const parasiteDictionary = ["du coup", "en fait", "voilأ ", "un petit peu", "euh", "globalement", "concrأ¨tement", "effectivement", "donc", "c'est-أ -dire", "au final", "disons que", "typiquement", "clairement", "tout simplement", "en gros", "pour le coup", "un peu", "voilأ  quoi", "tu vois", "franchement", "honnأھtement", "en rأ©alitأ©", "pour ainsi dire", "alors", "en quelque sorte", "justement", "au niveau de", "quelque part", "on va dire", "fondamentalement", "vأ©ritablement", "pour ma part", "en soi", "entre guillemets", "si vous voulez", "de base", "sur la fin"];
        const stopWords = ["je", "me", "moi", "tu", "te", "toi", "il", "elle", "on", "nous", "vous", "ils", "elles", "le", "la", "les", "un", "une", "des", "du", "de", "ce", "cet", "cette", "ces", "se", "soi", "lui", "leur", "y", "en", "mon", "ton", "son", "ma", "ta", "sa", "mes", "tes", "ses", "notre", "votre", "nos", "vos", "leurs", "qui", "que", "quoi", "dont", "oأ¹", "quel", "quels", "quelle", "quelles", "et", "ou", "mais", "est", "sont", "pour", "dans", "par", "avec", "pas", "ne", "si", "ici", "lأ ", "ont", "aux", "trأ¨s"];

        let activeFocusWord = null;
        const textarea = document.getElementById('textarea');
        const highlightLayer = document.getElementById('highlight-layer');

        function format(command, value = null) {
            document.execCommand(command, false, value);
            textarea.focus();
            process();
        }

        function addLink() {
            const url = prompt("Entrez l'URL :");
            if (url) format('createLink', url);
        }

        function process() {
            const text = textarea.innerText;
            let parasiteIndices = new Set(), parasiteCounts = {}, totalParasites = 0;
            parasiteDictionary.forEach(word => {
                const regex = new RegExp(`\\b(${word})\\b`, 'gi');
                let match;
                while ((match = regex.exec(text)) !== null) {
                    totalParasites++;
                    parasiteCounts[word.toLowerCase()] = (parasiteCounts[word.toLowerCase()] || 0) + 1;
                    for (let i = 0; i < match[0].length; i++) parasiteIndices.add(match.index + i);
                }
            });

            const wordRegex = /[a-zA-Zأ أ¢أ¤أ©أ¨أھأ«أ®أ¯أ´أ¶أ»أ¼أ¹أ§أ€أ‚أ„أ‰أˆأٹأ‹أژأڈأ”أ–أ›أœأ™أ‡]{3,}/g;
            let lastSeenAt = {}, badRepeatIndices = new Set(), repeatCounts = {}, wordCounter = 0, totalRepeats = 0;
            let match;
            while ((match = wordRegex.exec(text)) !== null) {
                wordCounter++;
                const word = match[0].toLowerCase();
                if (!stopWords.includes(word) && !parasiteIndices.has(match.index)) {
                    if (lastSeenAt[word] && (wordCounter - lastSeenAt[word].count <= 70)) {
                        if (!repeatCounts[word]) totalRepeats++;
                        repeatCounts[word] = (repeatCounts[word] || 1) + 1;
                        for (let i = 0; i < word.length; i++) {
                            badRepeatIndices.add(match.index + i);
                            badRepeatIndices.add(lastSeenAt[word].pos + i);
                        }
                    }
                    lastSeenAt[word] = { count: wordCounter, pos: match.index };
                }
            }

            let focusIndices = new Set();
            if (activeFocusWord) {
                const fRegex = new RegExp(`\\b(${activeFocusWord})\\b`, 'gi');
                let fMatch;
                while ((fMatch = fRegex.exec(text)) !== null) {
                    for (let i = 0; i < fMatch[0].length; i++) focusIndices.add(fMatch.index + i);
                }
            }
            highlightLayer.innerHTML = injectMarksIntoHTML(textarea, parasiteIndices, badRepeatIndices, focusIndices);
            document.getElementById('total-parasites').innerText = totalParasites;
            document.getElementById('total-repeats').innerText = totalRepeats;
            document.getElementById('total-words').innerText = (text.match(/[a-zA-Zأ أ¢أ¤أ©أ¨أھأ«أ®أ¯أ´أ¶أ»أ¼أ¹أ§]+/g) || []).length;
            const focusDisplay = document.getElementById('focus-display');
            focusDisplay.innerText = activeFocusWord || "Aucun";
            focusDisplay.classList.toggle('text-soft', !activeFocusWord);
            focusDisplay.classList.toggle('text-main', !!activeFocusWord);
            updateSidebars(parasiteCounts, repeatCounts);
        }

        function injectMarksIntoHTML(sourceElement, pIdx, rIdx, fIdx) {
            const clone = sourceElement.cloneNode(true);
            let charIndex = 0;
            function traverse(node) {
                if (node.nodeType === 3) { 
                    let newHtml = "";
                    const text = node.nodeValue;
                    for (let i = 0; i < text.length; i++) {
                        const globalIndex = charIndex + i;
                        let cls = "";
                        if (fIdx.has(globalIndex)) cls = "focus-active";
                        else if (pIdx.has(globalIndex)) cls = "parasite";
                        else if (rIdx.has(globalIndex)) cls = "repeat";
                        let char = text[i];
                        if (char === '<') char = '&lt;';
                        if (char === '>') char = '&gt;';
                        if (char === '&') char = '&amp;';
                        newHtml += cls ? `<mark class="${cls}">${char}</mark>` : char;
                    }
                    const span = document.createElement('span');
                    span.innerHTML = newHtml;
                    if (node.parentNode) node.parentNode.replaceChild(span, node);
                    charIndex += text.length;
                } else if (node.nodeType === 1 && node.childNodes.length > 0) {
                    Array.from(node.childNodes).forEach(traverse);
                }
            }
            traverse(clone);
            return clone.innerHTML;
        }

        function updateSidebars(pCounts, rCounts) {
            const pList = document.getElementById('word-list');
            const rList = document.getElementById('repeat-list');
            pList.innerHTML = Object.entries(pCounts).sort((a,b)=>b[1]-a[1]).map(([w,c])=>`<li onclick="toggleFocus('${w}')" class="sidebar-item sidebar-item-bg ${activeFocusWord===w?'active-focus':''} flex justify-between items-center font-bold p-3 rounded-lg"><span>${w.toUpperCase()}</span><span class="font-black text-base" style="color: var(--accent-color);">${c}</span></li>`).join('') || '<li class="text-soft text-sm">Aucun tic dأ©tectأ©.</li>';
            rList.innerHTML = Object.entries(rCounts).sort((a,b)=>b[1]-a[1]).map(([w,c])=>`<li onclick="toggleFocus('${w}')" class="sidebar-item sidebar-item-bg ${activeFocusWord===w?'active-focus':''} flex justify-between items-center font-bold p-3 rounded-lg"><span>${w.toUpperCase()}</span><span class="text-amber-500 dark:text-amber-400 font-black text-base">${c}x</span></li>`).join('') || '<li class="text-soft text-sm">Aucune rأ©pأ©tition dأ©tectأ©e.</li>';
        }

        function toggleFocus(word) { 
            activeFocusWord = (activeFocusWord === word) ? null : word; 
            process(); 
        }

        function toggleDarkMode() {
            const body = document.body;
            body.classList.toggle('dark-mode');
            localStorage.setItem('purge-dark-mode', body.classList.contains('dark-mode'));
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }

        function applyTheme(color) {
            document.documentElement.style.setProperty('--accent-color', color);
            const rgb = parseInt(color.substring(1), 16);
            const r = (rgb >> 16) & 0xff;
            const g = (rgb >> 8) & 0xff;
            const b = (rgb >> 0) & 0xff;
            document.documentElement.style.setProperty('--accent-soft', `rgba(${r}, ${g}, ${b}, 0.15)`);
            localStorage.setItem('purge-theme-color', color);
            
            // Update active button style
            document.querySelectorAll('.theme-btn').forEach(btn => {
                btn.classList.toggle('active-theme', btn.dataset.color === color);
            });
            process(); // Re-process to apply new colors to highlights
        }

        window.onload = () => {
            // Theme Picker setup
            const themes = ['#6366f1', '#ef4444', '#f97316', '#eab308', '#22c55e', '#d946ef'];
            const themePicker = document.getElementById('theme-picker');
            themes.forEach(t => {
                const b = document.createElement('button');
                b.className = 'theme-btn w-5 h-5 rounded-full hover:scale-125 transition-transform';
                b.style.backgroundColor = t;
                b.dataset.color = t;
                b.onclick = () => applyTheme(t);
                themePicker.appendChild(b);
            });

            // Restore user preferences
            const savedTheme = localStorage.getItem('purge-theme-color') || themes[0];
            applyTheme(savedTheme);

            const prefersDark = localStorage.getItem('purge-dark-mode') === 'true';
            if (prefersDark) {
                document.body.classList.add('dark-mode');
                document.getElementById('sun-icon').classList.add('hidden');
                document.getElementById('moon-icon').classList.remove('hidden');
            } else {
                document.getElementById('sun-icon').classList.remove('hidden');
                document.getElementById('moon-icon').classList.add('hidden');
            }

            textarea.innerHTML = `En fait, je sais pas trop comment dire, mais genre c'est un peu toujours la mأھme chose, tu vois, du coup je rأ©pأ¨te, je rأ©pأ¨te. Et en fait, c'est pas que j'ai rien أ  dire, c'est juste que, genre, les mots reviennent tout seuls, du coup voilأ  quoi, أ§a tourne un peu en boucle.<br><br>Genre tu commences une phrase, et en fait tu la finis pas vraiment, ou alors tu la refais, encore et encore, du coup أ§a donne un truc un peu bizarre, un peu rأ©pأ©titif, justement. Et puis voilأ , tu te dis â€œbon, je vais arrأھterâ€‌, mais en fait non, tu continues, tu continues. Du coup voilأ , en fait, c'est أ§a le truc : أ§a revient, أ§a revient, أ§a revient, et genre tu t'en rends mأھme plus compte. Et au final, en fait, t'as dit la mأھme chose trois fois, voire quatre, voire cinq, mais du coup... ben voilأ  quoi.`;
            textarea.addEventListener('input', process);
            textarea.addEventListener('scroll', () => {
                highlightLayer.scrollTop = textarea.scrollTop;
                highlightLayer.scrollLeft = textarea.scrollLeft;
            });
            process();
        };
    </script>
</body>
</html>
