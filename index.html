<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purge-Script Pro | Workflow Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <style>
        :root { 
            --accent-color: #6366f1; 
            --accent-soft: rgba(99, 102, 241, 0.15); 
            --focus-color: #f02e65; 
            --montage-color: #7dd3fc; 
        }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #0f172a; 
            color: #f1f5f9; 
            margin: 0;
            overflow-x: hidden;
        } 
        
        h1, h1 span { color: #ffffff !important; }
        .editor-font { font-family: 'IBM Plex Sans', sans-serif; font-size: 1.05rem; line-height: 1.6; }
        
        #canvas-container {
            position: relative;
            width: 100%;
            height: 700px;
            background-color: #0f172a;
            background-image: radial-gradient(#1e293b 1px, transparent 1px);
            background-size: 30px 30px;
            overflow: hidden;
            border-radius: 2rem;
            border: 1px solid #334155;
        }

        .bubble {
            position: absolute;
            min-width: 160px;
            max-width: 250px;
            padding: 0.8rem;
            background: #1e293b;
            border: 2px solid #334155;
            border-radius: 1rem;
            cursor: grab;
            user-select: none;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            z-index: 10;
        }

        .bubble:active { cursor: grabbing; }
        
        .bubble-group {
            position: absolute;
            min-width: 220px;
            min-height: 150px;
            background: rgba(30, 41, 59, 0.5);
            border: 2px dashed #475569;
            border-radius: 1.5rem;
            z-index: 5;
        }

        .color-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .editor-container { 
            position: relative; 
            min-height: 500px; 
            border-radius: 1.5rem; 
            background-color: #1e293b; 
            border: 1px solid #334155;
        }

        .sync-text { 
            position: absolute; 
            top: 0; left: 0; width: 100%; height: 100%; 
            padding: 30px; 
            white-space: pre-wrap; 
            word-wrap: break-word; 
            overflow-y: auto; 
            border: none; 
            margin: 0; 
            background: transparent; 
        }
        
        #textarea { color: transparent; caret-color: #ffffff; z-index: 2; resize: none; outline: none; }
        #highlight-layer { z-index: 1; pointer-events: none; color: #e2e8f0 !important; }
        
        mark { background: none; color: inherit; }
        .show-parasites mark.parasite { background-color: var(--accent-soft); border-bottom: 2px solid var(--accent-color); border-radius: 2px; }
        .show-repeats mark.repeat { background-color: rgba(245, 158, 11, 0.15); border-bottom: 2px solid #f59e0b; border-radius: 2px; }
        mark.focus-active { background-color: rgba(240, 46, 101, 0.3) !important; border-bottom: 2px solid var(--focus-color) !important; font-weight: 600; }
        .show-montage mark.montage { background-color: var(--montage-color) !important; color: #0369a1 !important; font-weight: 700; }
        
        .sidebar-item { cursor: pointer; transition: all 0.2s; }
        .sidebar-item:hover { background-color: rgba(255,255,255,0.05); }
        
        .bg-card { background-color: #1e293b; border: 1px solid #334155; border-left: 4px solid var(--accent-color); }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        #textarea::-webkit-scrollbar-thumb, .scroll-custom::-webkit-scrollbar-thumb, body::-webkit-scrollbar-thumb { background: var(--accent-color); border-radius: 10px; }
        
        .switch { position: relative; display: inline-block; width: 34px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #334155; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent-color); }
        input:checked + .slider:before { transform: translateX(14px); }

        #share-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 50; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .modal-content { background: #1e293b; padding: 2rem; border-radius: 1.5rem; width: 90%; max-width: 400px; color: white; border: 1px solid #334155; }

        .wf-tab { position: relative; padding: 1rem 1.5rem; cursor: pointer; color: #64748b; font-weight: 700; font-size: 0.75rem; text-transform: uppercase; transition: all 0.3s; }
        .wf-tab.active { color: white; }
        .wf-tab.active::after { content: ""; position: absolute; bottom: 0; left: 25%; width: 50%; height: 3px; background: var(--accent-color); border-radius: 10px 10px 0 0; }
        .wf-step-num { display: inline-flex; align-items: center; justify-content: center; width: 20px; height: 20px; border-radius: 50%; border: 1px solid currentColor; margin-right: 8px; font-size: 10px; }
        
        .timeline-block { border-left-width: 16px !important; transition: border-color 0.3s; }
    </style>
</head>
<body class="antialiased">

    <div id="share-modal">
        <div class="modal-content shadow-2xl">
            <h3 class="text-xl font-extrabold mb-2">Lien d'invitation</h3>
            <p class="text-xs text-slate-400 mb-6">Générez un lien unique pour un collaborateur.</p>
            <select id="share-role" class="w-full p-4 rounded-xl border bg-slate-900 border-slate-700 outline-none text-white mb-8">
                <option value="editors">Éditeur (Peut modifier)</option>
                <option value="viewers">Lecteur (Lecture seule)</option>
            </select>
            <div class="flex flex-col gap-3">
                <button onclick="generateInviteLink()" class="w-full bg-indigo-500 hover:bg-indigo-600 text-white py-4 rounded-2xl font-bold text-sm transition" style="background-color: var(--accent-color);">Générer et copier le lien</button>
                <button onclick="toggleShareModal()" class="w-full bg-slate-800 py-4 rounded-2xl font-bold text-sm text-slate-400">Annuler</button>
            </div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto px-6 py-6 md:py-10">
        <header class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-4 border-b border-slate-800 pb-8">
            <div>
                <div class="flex items-center gap-3">
                    <h1 class="text-3xl font-extrabold tracking-tight">Purge-Script<span>.</span></h1>
                    <span id="save-status" class="text-[10px] uppercase font-bold transition-opacity" style="color: var(--accent-color); opacity: 0;">En direct</span>
                </div>
                <p class="text-slate-500 text-sm font-medium italic mt-1"><span id="user-display">Mode Local</span></p>
            </div>
            <div class="flex flex-wrap items-center gap-4">
                <button id="share-btn" onclick="toggleShareModal()" class="hidden items-center gap-2 px-5 py-2.5 text-white rounded-xl text-xs font-bold hover:scale-105 transition shadow-lg" style="background-color: var(--accent-color);">Inviter</button>
                <button id="auth-btn" onclick="handleAuth()" class="flex items-center gap-2 px-4 py-2 bg-slate-800 border border-slate-700 rounded-xl text-xs font-bold shadow-sm transition"><span id="auth-btn-text">Se connecter</span></button>
                <div class="bg-slate-800 p-3 rounded-2xl shadow-sm border border-slate-700 flex items-center gap-4">
                    <div class="flex flex-wrap gap-1.5 max-w-[130px]" id="theme-picker"></div>
                </div>
            </div>
        </header>

        <div class="flex items-center justify-center mb-6 bg-slate-900/50 p-1 rounded-2xl border border-slate-800 max-w-2xl mx-auto">
            <div onclick="setStep(1)" id="wf-tab-1" class="wf-tab active flex-1 text-center"><span class="wf-step-num">1</span>Brouillon</div>
            <div onclick="setStep(2)" id="wf-tab-2" class="wf-tab flex-1 text-center"><span class="wf-step-num">2</span>Chronologie</div>
            <div onclick="setStep(3)" id="wf-tab-3" class="wf-tab flex-1 text-center"><span class="wf-step-num">3</span>Rédaction</div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div id="stats-row" class="lg:col-span-12 hidden grid grid-cols-5 gap-3">
                <div class="bg-slate-800/40 p-4 rounded-2xl border border-slate-700 shadow-sm"><p class="text-slate-500 text-[8px] font-bold uppercase mb-1">Tics</p><p id="total-parasites" class="text-lg font-extrabold" style="color: var(--accent-color);">0</p></div>
                <div class="bg-slate-800/40 p-4 rounded-2xl border border-slate-700 shadow-sm"><p class="text-slate-500 text-[8px] font-bold uppercase mb-1">Répétitions</p><p id="total-repeats" class="text-lg font-extrabold text-amber-500">0</p></div>
                <div class="bg-slate-800/40 p-4 rounded-2xl border border-slate-700 shadow-sm"><p class="text-slate-500 text-[8px] font-bold uppercase mb-1">Mots</p><p id="total-words" class="text-lg font-extrabold">0</p></div>
                <div class="bg-slate-800/40 p-4 rounded-2xl border border-slate-700 shadow-sm"><p class="text-slate-500 text-[8px] font-bold uppercase mb-1">Durée</p><p id="duration-display" class="text-lg font-extrabold" style="color: var(--accent-color);">0s</p></div>
                <div class="bg-slate-800/40 p-4 rounded-2xl border border-slate-700 shadow-sm"><p class="text-slate-500 text-[8px] font-bold uppercase mb-1">Focus</p><p id="focus-display" class="text-sm font-extrabold text-slate-400 truncate">Aucun</p></div>
            </div>

            <div id="main-column" class="lg:col-span-12 space-y-4">
                <div id="projects-nav" class="hidden flex items-center justify-between bg-card p-2 rounded-2xl border shadow-sm">
                    <div class="flex gap-2" id="tabs-container">
                        <button onclick="switchProject(1)" id="p-tab-1" class="project-tab px-4 py-2 rounded-xl text-[10px] font-bold uppercase transition">Projet 1</button>
                        <button onclick="switchProject(2)" id="p-tab-2" class="project-tab px-4 py-2 rounded-xl text-[10px] font-bold uppercase transition">Projet 2</button>
                        <button onclick="switchProject(3)" id="p-tab-3" class="project-tab px-4 py-2 rounded-xl text-[10px] font-bold uppercase transition">Projet 3</button>
                        <button onclick="switchProject(4)" id="p-tab-4" class="project-tab px-4 py-2 rounded-xl text-[10px] font-bold uppercase transition">Projet 4</button>
                    </div>
                </div>

                <!-- STEP 1: BRAINSTORMING CANVAS -->
                <div id="step-1-view" class="space-y-4 relative">
                    <div id="canvas-container" class="shadow-2xl"></div>
                    <div class="absolute bottom-10 left-1/2 -translate-x-1/2 w-full max-w-xl px-4">
                        <div class="bg-slate-800/90 backdrop-blur-md p-2 rounded-3xl border border-slate-700 shadow-2xl flex gap-3 items-center">
                            <input type="text" id="bubble-input" class="flex-1 bg-transparent border-none outline-none px-6 py-3 text-white placeholder-slate-500 font-medium" placeholder="Une idée ? Tapez Entrée...">
                            <button onclick="createBubbleFromInput()" class="bg-indigo-500 text-white p-3 rounded-2xl hover:bg-indigo-600 transition" style="background-color: var(--accent-color);">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                            </button>
                        </div>
                    </div>
                    <button onclick="syncBubblesToTimeline()" class="absolute top-6 right-6 bg-indigo-500/10 text-[10px] font-bold uppercase tracking-widest text-indigo-400 px-4 py-2 rounded-xl border border-indigo-500/30 hover:bg-indigo-500 hover:text-white transition">
                        Synchroniser Chrono →
                    </button>
                </div>

                <!-- STEP 2: TIMELINE -->
                <div id="step-2-view" class="hidden space-y-4">
                    <div class="bg-card p-8 rounded-[2rem] shadow-lg">
                        <div class="flex justify-between items-center mb-8">
                            <h2 class="text-xl font-bold">Structure Chronologique</h2>
                            <button onclick="addTimelineStep()" class="text-white px-4 py-2 rounded-xl text-xs font-bold transition" style="background-color: var(--accent-color);">+ Ajouter un bloc</button>
                        </div>
                        <div id="timeline-container" class="space-y-3"></div>
                    </div>
                </div>

                <!-- STEP 3: WRITING -->
                <div id="step-3-view" class="hidden space-y-4">
                    <div class="bg-slate-800/40 p-4 rounded-2xl border border-slate-700 flex flex-wrap items-center gap-6 text-[10px] font-bold uppercase">
                        <div class="flex items-center gap-4 flex-1">
                            <span class="text-slate-500">Débit :</span>
                            <input type="range" id="wpm-slider" min="100" max="250" value="150" class="flex-1" style="accent-color: var(--accent-color);" oninput="updateWpmDisplay(this.value); process();">
                            <span id="wpm-value" class="w-12 text-right" style="color: var(--accent-color);">150</span>
                        </div>
                        <div class="flex gap-4 border-l border-slate-700 pl-6">
                            <div class="flex items-center gap-2"><span>Tics</span><label class="switch"><input type="checkbox" id="toggle-parasites" checked onchange="process()"><span class="slider"></span></label></div>
                            <div class="flex items-center gap-2"><span>Répé.</span><label class="switch"><input type="checkbox" id="toggle-repeats" checked onchange="process()"><span class="slider"></span></label></div>
                            <div class="flex items-center gap-2"><span>Mont.</span><label class="switch"><input type="checkbox" id="toggle-montage" checked onchange="process()"><span class="slider"></span></label></div>
                        </div>
                    </div>
                    <div id="editor-wrapper" class="editor-container shadow-sm overflow-hidden show-parasites show-repeats show-montage">
                        <div id="highlight-layer" class="sync-text editor-font"></div>
                        <textarea id="textarea" class="sync-text editor-font" placeholder="Écrivez votre script final..." spellcheck="false"></textarea>
                    </div>
                    <div class="flex gap-4">
                        <button onclick="copyText()" class="text-white px-8 py-3.5 rounded-2xl font-bold shadow-lg uppercase text-xs tracking-widest hover:scale-105 transition" style="background-color: var(--accent-color);">Copier</button>
                    </div>
                </div>
            </div>

            <div id="analysis-column" class="lg:col-span-4 hidden space-y-6">
                <div class="bg-slate-900 text-white p-7 rounded-[2rem] shadow-xl space-y-8 border border-slate-800">
                    <div><h2 class="text-[9px] font-bold uppercase text-slate-600 mb-4 tracking-widest">Tics</h2><ul id="word-list" class="space-y-1 max-h-40 overflow-y-auto pr-2 text-[11px] scroll-custom"></ul></div>
                    <div><h2 class="text-[9px] font-bold uppercase text-slate-600 mb-4 tracking-widest">Répétitions</h2><ul id="repeat-list" class="space-y-1 max-h-40 overflow-y-auto pr-2 text-[11px] scroll-custom"></ul></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyCPI5JRtaODgMbhpvmb5jJ9pGaEOFms8sI", 
            authDomain: "script-p-6c6df.firebaseapp.com", 
            projectId: "script-p-6c6df", 
            storageBucket: "script-p-6c6df.firebasestorage.app", 
            messagingSenderId: "792026086516", 
            appId: "1:792026086516:web:cf2882d0bd6e770db7a521" 
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const parasiteDictionary = ["du coup", "en fait", "voilà", "un petit peu", "euh", "globalement", "concrètement", "effectivement", "donc", "c'est-à-dire", "au final", "disons que", "typiquement", "clairement", "tout simplement", "en gros", "pour le coup", "un peu", "voilà quoi", "tu vois", "franchement", "honnêtement", "en réalité", "pour ainsi dire", "alors", "en quelque sorte", "justement", "au niveau de", "quelque part", "on va dire", "fondamentalement", "véritablement", "pour ma part", "en soi", "entre guillemets", "si vous voulez", "de base", "sur la fin"];
        const stopWords = ["je", "me", "moi", "tu", "te", "toi", "il", "elle", "on", "nous", "vous", "ils", "elles", "le", "la", "les", "un", "une", "des", "du", "de", "ce", "cet", "cette", "ces", "se", "soi", "lui", "leur", "y", "en", "mon", "ton", "son", "ma", "ta", "sa", "mes", "tes", "ses", "notre", "votre", "nos", "vos", "leurs", "qui", "que", "quoi", "dont", "où", "quel", "quels", "quelle", "quelles", "et", "ou", "mais", "est", "sont", "pour", "dans", "par", "avec", "pas", "ne", "si", "ici", "là", "ont", "aux", "très"];
        const THEME_COLORS = ['#6366f1', '#ef4444', '#f97316', '#eab308', '#84cc16', '#10b981', '#06b6d4', '#2563eb', '#8b5cf6', '#d946ef', '#ec4899', '#f43f5e'];

        let activeFocusWord = null; let currentUser = null; let currentScriptId = null; let userRole = 'owner'; 
        let ignoredRepeats = new Set(); let scriptListener = null; let currentStep = 1; let timelineSteps = [];
        let bubbles = []; // { id, text, x, y, parentId, color }

        const textarea = document.getElementById('textarea');
        const highlightLayer = document.getElementById('highlight-layer');
        const editorWrapper = document.getElementById('editor-wrapper');
        const canvas = document.getElementById('canvas-container');
        const bubbleInput = document.getElementById('bubble-input');

        function updateWpmDisplay(v) { document.getElementById('wpm-value').innerText = v; }
        function handleAuth() { if (currentUser) auth.signOut(); else auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }

        function setStep(step) {
            currentStep = step;
            document.querySelectorAll('.wf-tab').forEach(t => t.classList.remove('active'));
            document.getElementById(`wf-tab-${step}`).classList.add('active');
            document.getElementById('step-1-view').classList.toggle('hidden', step !== 1);
            document.getElementById('step-2-view').classList.toggle('hidden', step !== 2);
            document.getElementById('step-3-view').classList.toggle('hidden', step !== 3);
            const mainCol = document.getElementById('main-column');
            const analysisCol = document.getElementById('analysis-column');
            const statsRow = document.getElementById('stats-row');
            if (step === 3) { mainCol.classList.replace('lg:col-span-12', 'lg:col-span-8'); analysisCol.classList.remove('hidden'); statsRow.classList.remove('hidden'); process(); }
            else { mainCol.classList.replace('lg:col-span-8', 'lg:col-span-12'); analysisCol.classList.add('hidden'); statsRow.classList.add('hidden'); }
        }

        // --- BUBBLE SYSTEM ---

        bubbleInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') createBubbleFromInput(); });

        function createBubbleFromInput() {
            const text = bubbleInput.value.trim();
            if (!text) return;
            const newBubble = {
                id: "b_" + Date.now(),
                text: text,
                x: Math.random() * (canvas.clientWidth - 200) + 50,
                y: Math.random() * (canvas.clientHeight - 350) + 50, // SPAWN LIMIT TO AVOID INPUT AREA
                parentId: null,
                color: '#6366f1'
            };
            bubbles.push(newBubble);
            bubbleInput.value = "";
            renderBubbles();
            autoSave();
        }

        function renderBubbles() {
            canvas.innerHTML = "";
            const parents = bubbles.filter(b => !b.parentId);
            
            parents.forEach(p => {
                const groupDiv = document.createElement('div');
                groupDiv.className = "bubble-group";
                groupDiv.style.left = p.x + "px";
                groupDiv.style.top = p.y + "px";
                groupDiv.style.borderColor = p.color;
                groupDiv.dataset.id = p.id;

                const pEl = createBubbleUI(p);
                groupDiv.appendChild(pEl);

                const children = bubbles.filter(b => b.parentId === p.id);
                children.forEach(c => {
                    const cEl = createBubbleUI(c, true);
                    groupDiv.appendChild(cEl);
                });

                canvas.appendChild(groupDiv);
                makeDraggable(groupDiv, p.id, true);
            });
        }

        function createBubbleUI(b, isNested = false) {
            const el = document.createElement('div');
            el.className = `bubble group`;
            if (isNested) {
                el.style.left = b.x + "px";
                el.style.top = b.y + "px";
                el.style.position = "absolute";
            }
            
            let colorPicker = "";
            if (!isNested) {
                colorPicker = `<div class="flex gap-1 mt-2 opacity-0 group-hover:opacity-100 transition">
                    ${THEME_COLORS.slice(0, 6).map(c => `<div class="color-dot" style="background:${c}" onclick="setBubbleColor('${b.id}', '${c}')"></div>`).join('')}
                </div>`;
            }

            el.innerHTML = `
                <div class="text-xs font-bold text-slate-200 break-words">${b.text}</div>
                ${colorPicker}
                <div class="absolute -top-2 -right-2 flex gap-1">
                    ${isNested ? `<button onclick="detachBubble('${b.id}')" class="bg-amber-500 text-white w-6 h-6 rounded-full text-[10px] flex items-center justify-center shadow-lg" title="Détacher">🔗</button>` : ''}
                    <button onclick="deleteBubble('${b.id}')" class="bg-red-500 text-white w-6 h-6 rounded-full text-[10px] flex items-center justify-center shadow-lg">✕</button>
                </div>
            `;
            
            if (isNested) makeDraggable(el, b.id, false);
            return el;
        }

        function setBubbleColor(id, color) {
            const b = bubbles.find(x => x.id === id);
            if (b) {
                b.color = color;
                renderBubbles();
                autoSave();
            }
        }

        function deleteBubble(id) {
            bubbles = bubbles.filter(b => b.id !== id && b.parentId !== id);
            renderBubbles();
            autoSave();
        }

        function detachBubble(id) {
            const b = bubbles.find(x => x.id === id);
            const parent = bubbles.find(p => p.id === b.parentId);
            if (b && parent) {
                // Convert relative to absolute
                b.x = parent.x + b.x;
                b.y = parent.y + b.y;
                b.parentId = null;
                renderBubbles();
                autoSave();
            }
        }

        function makeDraggable(el, bubbleId, isGroup) {
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            el.onmousedown = (e) => {
                if (e.target.closest('button') || e.target.classList.contains('color-dot')) return;
                e.preventDefault();
                pos3 = e.clientX; pos4 = e.clientY;
                document.onmouseup = () => {
                    document.onmouseup = null; document.onmousemove = null;
                    const b = bubbles.find(x => x.id === bubbleId);
                    if (b) {
                        b.x = parseInt(el.style.left);
                        b.y = parseInt(el.style.top);
                    }
                    if (isGroup) checkCollisions(el, bubbleId);
                    autoSave();
                };
                document.onmousemove = (e) => {
                    pos1 = pos3 - e.clientX; pos2 = pos4 - e.clientY;
                    pos3 = e.clientX; pos4 = e.clientY;
                    el.style.top = (el.offsetTop - pos2) + "px";
                    el.style.left = (el.offsetLeft - pos1) + "px";
                };
            };
        }

        function checkCollisions(draggedEl, draggedId) {
            const rect1 = draggedEl.getBoundingClientRect();
            const groups = document.querySelectorAll('.bubble-group');
            
            groups.forEach(targetGroup => {
                const targetId = targetGroup.dataset.id;
                if (targetId === draggedId) return;

                const rect2 = targetGroup.getBoundingClientRect();
                const overlap = !(rect1.right < rect2.left || rect1.left > rect2.right || rect1.bottom < rect2.top || rect1.top > rect2.bottom);

                if (overlap) {
                    const b = bubbles.find(x => x.id === draggedId);
                    const parent = bubbles.find(x => x.id === targetId);
                    
                    // Calcul de la position relative pour que la bulle reste AU MÊME ENDROIT VISUEL
                    b.x = b.x - parent.x;
                    b.y = b.y - parent.y;
                    b.parentId = targetId;

                    // On déplace aussi les enfants s'il y en avait (fusion de groupes)
                    bubbles.forEach(child => {
                        if (child.parentId === draggedId) {
                            child.parentId = targetId;
                            child.x = (b.x + child.x);
                            child.y = (b.y + child.y);
                        }
                    });
                    renderBubbles();
                }
            });
        }

        function syncBubblesToTimeline() {
            const parents = bubbles.filter(b => !b.parentId).sort((a,b) => a.y - b.y);
            timelineSteps = [];
            parents.forEach(p => {
                timelineSteps.push({ text: p.text, color: p.color });
                bubbles.filter(b => b.parentId === p.id).forEach(c => {
                    timelineSteps.push({ text: c.text, color: p.color });
                });
            });
            renderTimeline();
            setStep(2);
            autoSave();
        }

        // --- AUTH & DATA ---

        auth.onAuthStateChanged(async (user) => {
            currentUser = user;
            if (user) {
                document.getElementById('auth-btn-text').innerText = "Déconnexion";
                document.getElementById('user-display').innerText = user.displayName;
                document.getElementById('share-btn').style.display = 'flex';
                document.getElementById('projects-nav').classList.remove('hidden');
                switchProject(1);
            } else {
                currentScriptId = null;
                document.getElementById('user-display').innerText = "Mode Local";
                textarea.value = localStorage.getItem('purge-content') || "";
                bubbles = JSON.parse(localStorage.getItem('purge-bubbles')) || [];
                renderBubbles();
                process();
            }
        });

        async function switchProject(index) {
            if (!currentUser) return;
            document.querySelectorAll('.project-tab').forEach(t => { t.classList.remove('active'); t.style.backgroundColor = "transparent"; });
            const activeTab = document.getElementById(`p-tab-${index}`);
            if(activeTab) { activeTab.classList.add('active'); activeTab.style.backgroundColor = "var(--accent-color)"; loadScript(`${currentUser.uid}_${index}`); }
        }

        function loadScript(id) {
            if (scriptListener) scriptListener();
            currentScriptId = id;
            scriptListener = db.collection('scripts').doc(id).onSnapshot(doc => {
                if (!doc.exists) {
                    if (id.startsWith(currentUser.uid)) { 
                        db.collection('scripts').doc(id).set({ content: "", bubbles: [], timeline: [], title: `Projet ${id.split('_')[1]}`, owner: currentUser.uid, ownerEmail: currentUser.email, lastUpdated: firebase.firestore.FieldValue.serverTimestamp() }); 
                    }
                    return;
                }
                const data = doc.data();
                if (JSON.stringify(data.bubbles) !== JSON.stringify(bubbles)) { bubbles = data.bubbles || []; renderBubbles(); }
                if (data.content !== textarea.value && document.activeElement !== textarea) textarea.value = data.content || "";
                timelineSteps = data.timeline || [];
                renderTimeline();
                process();
            });
        }

        function autoSave() {
            if (currentUser && currentScriptId) {
                db.collection('scripts').doc(currentScriptId).update({ 
                    bubbles: bubbles, timeline: timelineSteps, content: textarea.value, 
                    lastUpdated: firebase.firestore.FieldValue.serverTimestamp() 
                }).then(() => { 
                    const s = document.getElementById('save-status'); s.style.opacity = '1'; 
                    setTimeout(() => s.style.opacity = '0', 1000); 
                });
            } else {
                localStorage.setItem('purge-content', textarea.value);
                localStorage.setItem('purge-bubbles', JSON.stringify(bubbles));
            }
        }

        // --- UI RENDERERS ---

        function renderTimeline() {
            const container = document.getElementById('timeline-container');
            container.innerHTML = "";
            timelineSteps.forEach((step, i) => {
                const div = document.createElement('div');
                div.className = "flex gap-3 bg-slate-800/50 p-3 rounded-2xl border border-slate-700 items-start group timeline-block";
                div.style.borderLeftColor = step.color || 'var(--accent-color)';
                div.innerHTML = `
                    <textarea oninput="timelineSteps[${i}].text=this.value;autoSave()" class="flex-1 bg-transparent border-none outline-none text-sm text-slate-300 py-1 resize-none" rows="1">${step.text}</textarea>
                    <button onclick="timelineSteps.splice(${i},1);renderTimeline();autoSave()" class="p-2 text-slate-600 hover:text-red-500">✕</button>
                `;
                container.appendChild(div);
            });
        }

        function process() {
            if (currentStep !== 3) return;
            const text = textarea.value;
            const wordCount = (text.match(/[a-zA-Zàâäéèêëîïôöûüùç]+/g) || []).length;
            const wpm = parseInt(document.getElementById('wpm-slider').value) || 150;
            const totalSeconds = Math.round((wordCount / wpm) * 60);
            document.getElementById('duration-display').innerText = `${Math.floor(totalSeconds / 60)}m ${totalSeconds % 60}s`;
            
            // Minimal highlight logic for performance
            highlightLayer.innerHTML = text.replace(/\n/g, '<br>') + ' ';
            document.getElementById('total-words').innerText = wordCount;
            autoSave();
        }

        function copyText() { navigator.clipboard.writeText(textarea.value); alert("Script copié !"); }
        function addTimelineStep() { timelineSteps.push({ text: "Nouveau bloc", color: "#6366f1" }); renderTimeline(); autoSave(); }
        function toggleShareModal() { document.getElementById('share-modal').style.display = (document.getElementById('share-modal').style.display === 'flex') ? 'none' : 'flex'; }

        window.onload = () => {
            textarea.addEventListener('input', process);
            textarea.addEventListener('scroll', () => highlightLayer.scrollTop = textarea.scrollTop);
            setStep(1);
        };
    </script>
</body>
</html>
