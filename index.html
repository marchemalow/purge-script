<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purge-Script Pro | Workflow Collaboratif Senior</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <style>
        :root { 
            --accent-color: #ef4444; 
            --accent-soft: rgba(239, 68, 68, 0.15); 
            --focus-color: #f02e65; 
            --montage-color: #7dd3fc; 
            --comment-color: #facc15;
        }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #0f172a; 
            color: #f1f5f9; 
            margin: 0;
            overflow-x: hidden;
        } 
        
        h1, h1 span { color: #ffffff !important; }
        .editor-font { font-family: 'IBM Plex Sans', sans-serif; font-size: 1.05rem; line-height: 1.6; }
        
        /* Layout & Navigation */
        #canvas-container {
            position: relative;
            width: 100%;
            height: 600px;
            background-color: #0f172a;
            background-image: radial-gradient(circle at 2px 2px, #1e293b 1px, transparent 0);
            background-size: 40px 40px;
            overflow: hidden;
            border-radius: 2rem;
            border: 1px solid #334155;
            touch-action: none;
        }

        /* Bubbles */
        .bubble {
            position: absolute;
            min-width: 200px;
            max-width: 300px;
            padding: 1rem;
            background: #1e293b;
            border: 2px solid #334155;
            border-radius: 1.25rem;
            cursor: grab;
            user-select: none;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.4);
            z-index: 10;
        }
        .bubble:active { cursor: grabbing; }

        /* Timeline Blocks */
        #timeline-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 20px;
            min-height: 500px;
            background: #0f172a;
            border-radius: 2rem;
            border: 1px solid #334155;
        }
        .timeline-block {
            width: 100%;
            background: #1e293b;
            border-left: 6px solid var(--accent-color);
            border-radius: 1rem;
            padding: 0 1.25rem;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: move;
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.3s;
            border: 1px solid #334155;
            height: 80px;
            position: relative;
        }
        .timeline-block.dragging { opacity: 0.5; transform: scale(0.98); }

        /* Color Picker Component */
        .color-picker-trigger {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .color-menu {
            display: none;
            position: absolute;
            background: #1e293b;
            border: 1px solid #334155;
            padding: 10px;
            border-radius: 1rem;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            z-index: 1000;
            box-shadow: 0 15px 30px rgba(0,0,0,0.6);
            margin-top: 8px;
        }
        .color-menu.active { display: grid; }
        .color-dot-btn { width: 18px; height: 18px; border-radius: 50%; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); }
        .color-dot-btn:hover { transform: scale(1.3); }

        /* Editor Contextual Suggestion */
        .editor-container { 
            position: relative; 
            min-height: 600px; 
            border-radius: 1.5rem; 
            background-color: #1e293b; 
            border: 1px solid #334155;
            overflow: hidden;
        }
        .sync-text { 
            position: absolute; 
            top: 0; left: 0; width: 100%; height: 100%; 
            padding: 30px; 
            white-space: pre-wrap; 
            word-wrap: break-word; 
            border: none; 
            margin: 0; 
            background: transparent; 
            overflow-y: auto;
            box-sizing: border-box;
        }
        #textarea { 
            color: transparent; 
            caret-color: #ffffff; 
            z-index: 2; 
            resize: none; 
            outline: none; 
        }
        #highlight-layer { 
            z-index: 1; 
            pointer-events: none; 
            color: #e2e8f0; 
        }

        /* Comments & Floating Button */
        #suggest-btn-context {
            display: none;
            position: absolute;
            z-index: 50;
            background: var(--comment-color);
            color: #000;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            font-weight: 900;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            transition: transform 0.1s;
        }
        #suggest-btn-context:hover { transform: scale(1.2); }

        .comment-dot {
            display: inline-flex;
            width: 14px;
            height: 14px;
            background-color: var(--comment-color);
            border-radius: 50%;
            margin: 0 2px;
            cursor: pointer;
            pointer-events: auto; /* Permet le clic à travers le layer highlight */
            box-shadow: 0 0 8px var(--comment-color);
            vertical-align: middle;
            border: 2px solid #1e293b;
        }

        #comment-popup {
            display: none;
            position: fixed;
            z-index: 9999;
            background: #1e293b;
            border: 1px solid var(--comment-color);
            padding: 16px;
            border-radius: 16px;
            width: 280px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
        }

        #suggestion-input-modal {
            display: none;
            position: fixed;
            z-index: 10000;
            background: #1e293b;
            padding: 20px;
            border-radius: 20px;
            border: 1px solid #334155;
            width: 320px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
        }

        /* Mirrors & Helpers */
        #textarea-mirror {
            position: absolute;
            visibility: hidden;
            white-space: pre-wrap;
            word-wrap: break-word;
            padding: 30px;
            box-sizing: border-box;
            font-family: 'IBM Plex Sans', sans-serif;
            font-size: 1.05rem;
            line-height: 1.6;
        }

        mark { background: none; color: inherit; position: relative; }
        .show-parasites mark.parasite { background-color: var(--accent-soft); border-bottom: 2px solid var(--accent-color); border-radius: 2px; }
        .show-repeats mark.repeat { background-color: rgba(245, 158, 11, 0.15); border-bottom: 2px solid #f59e0b; border-radius: 2px; }
        mark.focus-active { background-color: rgba(240, 46, 101, 0.3) !important; border-bottom: 2px solid var(--focus-color) !important; font-weight: 600; }
        .show-montage mark.montage { background-color: var(--montage-color) !important; color: #0369a1 !important; font-weight: 700; }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        #textarea::-webkit-scrollbar-thumb, body::-webkit-scrollbar-thumb { background: var(--accent-color); border-radius: 10px; }
        .switch { position: relative; display: inline-block; width: 34px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #334155; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent-color); }
        input:checked + .slider:before { transform: translateX(14px); }
        #share-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .modal-content { background: #1e293b; padding: 2rem; border-radius: 1.5rem; width: 90%; max-width: 400px; color: white; border: 1px solid #334155; }
        .project-tab.active { color: white; background-color: var(--accent-color) !important; }
        .wf-tab { position: relative; padding: 1rem 1.5rem; cursor: pointer; color: #64748b; font-weight: 700; font-size: 0.75rem; text-transform: uppercase; transition: all 0.3s; }
        .wf-tab.active { color: white; }
        .wf-tab.active::after { content: ""; position: absolute; bottom: 0; left: 25%; width: 50%; height: 3px; background: var(--accent-color); border-radius: 10px 10px 0 0; }
        .sync-input { background: transparent; border: none; outline: none; color: white; width: 100%; font-weight: 500; height: 100%; resize: none; overflow: hidden; }
        .bubble-input-field { background: transparent; border: none; outline: none; color: white; width: 100%; font-size: 11px; font-weight: 600; }
    </style>
</head>
<body class="antialiased">

    <!-- Miroir Invisible pour calcul caret -->
    <div id="textarea-mirror"></div>

    <!-- Modals Suggestions -->
    <div id="suggestion-input-modal" class="shadow-2xl">
        <h4 class="text-xs font-bold uppercase text-yellow-500 mb-3 tracking-widest">Nouvelle suggestion</h4>
        <textarea id="suggestion-text-field" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm text-white mb-4 outline-none focus:border-yellow-500" placeholder="Écrivez votre remarque..." rows="3"></textarea>
        <div class="flex gap-2">
            <button onclick="submitSuggestion()" class="flex-1 bg-yellow-500 text-black font-bold py-2 rounded-lg text-xs uppercase">Valider</button>

        </div>
    </div>

    <!-- Popup Visualisation Suggestion -->
    <div id="comment-popup">
        <div class="flex items-center justify-between mb-2">
            <p id="comment-author" class="text-[10px] font-bold text-yellow-500 uppercase tracking-widest"></p>
        </div>
        <p id="comment-text" class="text-xs text-slate-200 mb-4 leading-relaxed italic"></p>
        <div class="flex justify-end border-t border-slate-700/50 pt-2">

        </div>
    </div>

    <!-- Bouton Contextuel Flottant -->
    <div id="suggest-btn-context" onclick="openSuggestionModal()">+</div>

    <!-- Modal de Partage -->

            <h3 class="text-xl font-extrabold mb-2">Collaborer</h3>

                <option value="commenters">Commentateur (Suggestions)</option>
                <option value="viewers">Lecteur (Lecture seule)</option>
            </select>
            <div class="flex flex-col gap-3">
                <button onclick="generateInviteLink()" class="w-full bg-indigo-500 hover:bg-indigo-600 text-white py-4 rounded-2xl font-bold text-sm transition" style="background-color: var(--accent-color);">Générer lien unique</button>
                <button onclick="toggleShareModal()" class="w-full bg-slate-800 py-4 rounded-2xl font-bold text-sm text-slate-400">Fermer</button>
            </div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto px-6 py-6 md:py-10">
        <!-- HEADER -->
        <header class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-6">
            <div>
                <div class="flex items-center gap-3">
                    <h1 class="text-3xl font-extrabold tracking-tight">Purge-Script<span>.</span></h1>
                    <span id="save-status" class="text-[10px] uppercase font-bold transition-opacity" style="color: var(--accent-color); opacity: 0;">En direct</span>
                </div>
                <p class="text-slate-500 text-sm font-medium italic mt-1"><span id="user-display">Mode Local</span> • <span id="role-display" class="uppercase font-bold text-[10px]">Propriétaire</span></p>
            </div>
            <div class="flex flex-wrap items-center gap-4">
                <button id="share-btn" onclick="toggleShareModal()" class="hidden items-center gap-2 px-5 py-2.5 text-white rounded-xl text-xs font-bold hover:scale-105 transition shadow-lg" style="background-color: var(--accent-color);">Partager</button>
                <button id="auth-btn" onclick="handleAuth()" class="flex items-center gap-2 px-4 py-2 bg-slate-800 border border-slate-700 rounded-xl text-xs font-bold shadow-sm transition"><span id="auth-btn-text">Connexion</span></button>
                <div class="bg-slate-800 p-3 rounded-2xl shadow-sm border border-slate-700 flex items-center gap-4">
                    <div class="flex flex-wrap gap-1.5 max-w-[130px]" id="theme-picker"></div>
                </div>
            </div>
        </header>

        <!-- PROJECT BAR (TOP) -->
        <div id="projects-nav" class="hidden flex items-center justify-between bg-slate-800/50 p-2 rounded-2xl border border-slate-700 mb-6 shadow-sm">
            <div class="flex gap-2" id="tabs-container">
                <button onclick="switchProject(1)" id="p-tab-1" class="project-tab px-4 py-2 rounded-xl text-[10px] font-bold uppercase transition">Projet 1</button>
                <button onclick="switchProject(2)" id="p-tab-2" class="project-tab px-4 py-2 rounded-xl text-[10px] font-bold uppercase transition">Projet 2</button>
                <button onclick="switchProject(3)" id="p-tab-3" class="project-tab px-4 py-2 rounded-xl text-[10px] font-bold uppercase transition">Projet 3</button>
                <button onclick="switchProject(4)" id="p-tab-4" class="project-tab px-4 py-2 rounded-xl text-[10px] font-bold uppercase transition">Projet 4</button>
            </div>
            <button id="rename-btn" onclick="renameCurrentProject()" class="p-2 text-slate-500 hover:text-indigo-400 transition ml-4">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
            </button>
        </div>

        <!-- WORKFLOW TABS -->
        <div class="flex items-center justify-center mb-6 bg-slate-900/50 p-1 rounded-2xl border border-slate-800 max-w-2xl mx-auto">
            <div onclick="setStep(1)" id="wf-tab-1" class="wf-tab active flex-1 text-center">Brouillon</div>

        let activeFocusWord = null; let currentUser = null; let currentScriptId = null; 
        let userRole = 'owner'; let ignoredRepeats = new Set(); let scriptListener = null; 
        let currentStep = 1; let bubbles = []; let comments = []; 
        let suggestTimer = null; let currentCaretIndex = 0;

        const textarea = document.getElementById('textarea');
        const highlightLayer = document.getElementById('highlight-layer');
        const mirror = document.getElementById('textarea-mirror');
        const suggestBtn = document.getElementById('suggest-btn-context');
        const bubbleInput = document.getElementById('bubble-input');

        // --- CARET TRACKING DE PRÉCISION ---

        function getCaretCoordinates() {
            const index = textarea.selectionStart;
            const textBefore = textarea.value.substring(0, index);
            
            // Sync styles with mirror
            const style = getComputedStyle(textarea);
            mirror.style.width = style.width;
            mirror.style.padding = style.padding;
            mirror.style.lineHeight = style.lineHeight;
            mirror.style.fontSize = style.fontSize;
            mirror.style.fontFamily = style.fontFamily;
            
            mirror.textContent = textBefore;
            const span = document.createElement('span');
            span.textContent = textarea.value.substring(index, index + 1) || '.';
            mirror.appendChild(span);

            const rect = textarea.getBoundingClientRect();
            const spanRect = span.getBoundingClientRect();
            
            return {
                x: spanRect.left - rect.left,
                y: spanRect.top - rect.top - textarea.scrollTop
            };
        }

        textarea.addEventListener('click', handleContextSuggest);
        textarea.addEventListener('keyup', handleContextSuggest);
        textarea.addEventListener('scroll', () => {
            highlightLayer.scrollTop = textarea.scrollTop;
            suggestBtn.style.display = 'none';
        });

        function handleContextSuggest() {
            if (userRole === 'viewers') return;
            suggestBtn.style.display = 'none';
            clearTimeout(suggestTimer);
            currentCaretIndex = textarea.selectionStart;

            suggestTimer = setTimeout(() => {
                const coords = getCaretCoordinates();
                // Check bounds to avoid floating out of editor
                if (coords.y > 0 && coords.y < textarea.clientHeight) {
                    suggestBtn.style.display = 'flex';
                    suggestBtn.style.top = (coords.y + textarea.offsetTop - 30) + "px";
                    suggestBtn.style.left = (coords.x + textarea.offsetLeft) + "px";
                }
            }, 3000);
        }

        // --- GESTION SUGGESTIONS ---

        function openSuggestionModal() {
            if (userRole === 'viewers') return;
            const modal = document.getElementById('suggestion-input-modal');
            const coords = getCaretCoordinates();
            modal.style.display = 'block';
            modal.style.top = (coords.y + textarea.offsetTop + 20) + "px";
            modal.style.left = (coords.x + textarea.offsetLeft) + "px";
            document.getElementById('suggestion-text-field').focus();
            suggestBtn.style.display = 'none';
        }

        function closeSuggestionModal() {
            document.getElementById('suggestion-input-modal').style.display = 'none';
            document.getElementById('suggestion-text-field').value = "";
        }

        function submitSuggestion() {
            const val = document.getElementById('suggestion-text-field').value.trim();
            if (val) {
                const com = {
                    id: "c_" + Date.now(),
                    index: currentCaretIndex,
                    text: val,
                    author: currentUser.uid,
                    authorName: currentUser.displayName || currentUser.email
                };
                comments.push(com);
                autoSave();
                process();
            }
            closeSuggestionModal();
        }

        function showComment(id, event) {
            event.stopPropagation();
            const com = comments.find(c => c.id === id);
            if (!com) return;

            const popup = document.getElementById('comment-popup');
            document.getElementById('comment-author').innerText = com.authorName;
            document.getElementById('comment-text').innerText = com.text;
            
            const delBtn = document.getElementById('comment-delete-btn');
            if (userRole === 'owner' || com.author === currentUser.uid) {
                delBtn.style.display = 'block';
                delBtn.onclick = () => { deleteComment(id); popup.style.display = 'none'; };
            } else { delBtn.style.display = 'none'; }

            popup.style.display = 'block';
            popup.style.top = (event.clientY - 140) + "px";
            popup.style.left = (event.clientX - 140) + "px";
        }

        function deleteComment(id) {
            comments = comments.filter(c => c.id !== id);
            autoSave();
            process();
        }

        // --- BROUILLON & CHRONOLOGIE (SYNCHRO) ---

        function createBubbleFromInput() {
            const text = bubbleInput.value.trim();
            if (!text || userRole === 'viewers' || userRole === 'commenters') return;
            const accent = getComputedStyle(document.documentElement).getPropertyValue('--accent-color').trim();
            const newBubble = {
                id: "b_" + Date.now(),
                text: text,
                x: 50 + Math.random() * 300,
                y: 50 + Math.random() * 300,
                order: bubbles.length,
                color: accent
            };
            bubbles.push(newBubble);
            bubbleInput.value = "";
            renderDraft();
            autoSave();
        }

        function renderDraft() {
            canvas.innerHTML = "";
            bubbles.forEach(b => {
                const el = document.createElement('div');
                el.className = `bubble`;
                el.id = b.id;
                el.style.left = b.x + "px"; el.style.top = b.y + "px";
                el.style.borderColor = b.color;
                const paletteHtml = bubblePalette.map(c => `<div class="color-dot-btn" style="background:${c}" onclick="setBubbleColor('${b.id}', '${c}')"></div>`).join('');
                el.innerHTML = `
                    <div class="mb-3"><textarea class="bubble-input-field" ${userRole === 'viewers' || userRole === 'commenters' ? 'disabled' : ''} oninput="updateBubbleText('${b.id}', this.value)">${b.text}</textarea></div>
                    <div class="flex items-center justify-between border-t border-slate-700/50 pt-2">
                        <div class="relative">
                            <div class="color-picker-trigger" onclick="toggleColorMenu(event, '${b.id}_menu')">
                                <svg class="w-3.5 h-3.5 text-slate-400" fill="currentColor" viewBox="0 0 24 24"><path d="M14.06,9L15,9.94L5.92,19H5V18.08L14.06,9M17.66,3C17.41,3 17.15,3.1 16.96,3.29L15.13,5.12L18.88,8.87L20.71,7.04C21.1,6.65 21.1,6 20.71,5.63L18.37,3.29C18.17,3.09 17.92,3 17.66,3M14.06,6.19L3,17.25V21H6.75L17.81,9.94L14.06,6.19Z"/></svg>
                            </div>
                            <div id="${b.id}_menu" class="color-menu">${paletteHtml}</div>
                        </div>
                        <button onclick="deleteBubble('${b.id}')" class="text-slate-500 hover:text-red-400">✕</button>
                    </div>`;
                el.addEventListener('mousedown', (e) => {
                    if (e.target.closest('button') || e.target.closest('.color-picker-trigger') || e.target.closest('.color-menu') || e.target.closest('textarea')) return;
                    initDrag(e, b.id, el);
                });
                canvas.appendChild(el);
            });
        }

        function initDrag(e, id, el) {
            let startX = e.clientX - el.offsetLeft;
            let startY = e.clientY - el.offsetTop;
            function doDrag(e) {
                let x = e.clientX - startX; let y = e.clientY - startY;
                el.style.left = x + "px"; el.style.top = y + "px";
                const b = bubbles.find(b => b.id === id);
                if (b) { b.x = x; b.y = y; }
            }
            function stopDrag() { document.removeEventListener('mousemove', doDrag); document.removeEventListener('mouseup', stopDrag); autoSave(); }
            document.addEventListener('mousemove', doDrag); document.addEventListener('mouseup', stopDrag);
        }

        function renderTimeline() {
            timeline.innerHTML = "";
            const sorted = [...bubbles].sort((a, b) => a.order - b.order);
            sorted.forEach((b) => {
                const block = document.createElement('div');
                block.className = 'timeline-block';
                block.draggable = (userRole !== 'viewers' && userRole !== 'commenters');
                block.dataset.id = b.id;
                block.style.borderColor = b.color;
                const paletteHtml = bubblePalette.map(c => `<div class="color-dot-btn" style="background:${c}" onclick="setBubbleColor('${b.id}', '${c}')"></div>`).join('');
                block.innerHTML = `
                    <div class="drag-handle"><svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M8 9h8v2H8zm0 4h8v2H8z"></path></svg></div>
                    <div class="relative">
                        <div class="color-picker-trigger" onclick="toggleColorMenu(event, '${b.id}_tl_menu')"><div class="w-3.5 h-3.5 rounded-full" style="background-color: ${b.color}"></div></div>
                        <div id="${b.id}_tl_menu" class="color-menu">${paletteHtml}</div>
                    </div>
                    <div class="flex-1 h-full py-3"><textarea class="sync-input editor-font" ${userRole === 'viewers' || userRole === 'commenters' ? 'disabled' : ''} oninput="updateBubbleText('${b.id}', this.value)">${b.text}</textarea></div>
                    <button onclick="deleteBubble('${b.id}')" class="text-slate-500 hover:text-red-400 ml-2">✕</button>`;
                block.addEventListener('dragstart', () => block.classList.add('dragging'));
                block.addEventListener('dragend', () => { block.classList.remove('dragging'); reorderTimeline(); });
                timeline.appendChild(block);
            });
            timeline.addEventListener('dragover', e => {
                e.preventDefault();
                const afterElement = getDragAfterElement(timeline, e.clientY);
                const dragging = document.querySelector('.dragging');
                if (dragging) { if (afterElement == null) timeline.appendChild(dragging); else timeline.insertBefore(dragging, afterElement); }
            });
        }

        function getDragAfterElement(container, y) {
            const draggableElements = [...container.querySelectorAll('.timeline-block:not(.dragging)')];
            return draggableElements.reduce((closest, child) => {
                const box = child.getBoundingClientRect();
                const offset = y - box.top - box.height / 2;
                if (offset < 0 && offset > closest.offset) return { offset: offset, element: child };
                else return closest;
            }, { offset: Number.NEGATIVE_INFINITY }).element;
        }

        function reorderTimeline() {
            const blocks = [...timeline.querySelectorAll('.timeline-block')];
            blocks.forEach((block, index) => {
                const b = bubbles.find(b => b.id === block.dataset.id);
                if (b) b.order = index;
            });
            autoSave();
        }

        function updateBubbleText(id, val) {
            const b = bubbles.find(b => b.id === id);
            if (b) b.text = val;
            autoSave();
        }

        function setBubbleColor(id, color) {
            const b = bubbles.find(b => b.id === id);
            if (b) b.color = color;
            document.querySelectorAll('.color-menu').forEach(m => m.classList.remove('active'));
            currentStep === 1 ? renderDraft() : renderTimeline();
            autoSave();
        }

        function deleteBubble(id) {
            bubbles = bubbles.filter(b => b.id !== id);
            currentStep === 1 ? renderDraft() : renderTimeline();
            autoSave();
        }

        function toggleColorMenu(e, menuId) {
            e.stopPropagation();
            const menu = document.getElementById(menuId);
            const isOpen = menu.classList.contains('active');
            document.querySelectorAll('.color-menu').forEach(m => m.classList.remove('active'));
            if (!isOpen) menu.classList.add('active');
        }

        // --- CORE ENGINE ---

        function process() {
            if (currentStep !== 3) return;
            const text = textarea.value;
            const showP = document.getElementById('toggle-parasites').checked;
            const showR = document.getElementById('toggle-repeats').checked;
            const showM = document.getElementById('toggle-montage').checked;
            
            highlightLayer.classList.toggle('show-parasites', showP);
            highlightLayer.classList.toggle('show-repeats', showR);
            highlightLayer.classList.toggle('show-montage', showM);

            let montageIndices = new Set();
            if (showM) {
                const montageRegex = /\[.*?\]/g;
                let mMatch; while ((mMatch = montageRegex.exec(text)) !== null) { for (let i = 0; i < mMatch[0].length; i++) montageIndices.add(mMatch.index + i); }
            }

            let parasiteIndices = new Set(); let parasiteCounts = {}; let totalParasites = 0;
            parasiteDictionary.forEach(word => {
                const regex = new RegExp(`\\b(${word})\\b`, 'gi');
                let match; while ((match = regex.exec(text)) !== null) {
                    if (montageIndices.has(match.index)) continue;
                    totalParasites++; parasiteCounts[word.toLowerCase()] = (parasiteCounts[word.toLowerCase()] || 0) + 1;
                    for (let i = 0; i < match[0].length; i++) parasiteIndices.add(match.index + i);
                }
            });

            const wordRegex = /[a-zA-ZàâäéèêëîïôöûüùçÀÂÄÉÈÊËÎÏÔÖÛÜÙÇ]{3,}/g;
            let lastSeenAt = {}; let badRepeatIndices = new Set(); let repeatCounts = {}; let wordCounter = 0; let match;
            while ((match = wordRegex.exec(text)) !== null) {
                wordCounter++; const word = match[0].toLowerCase();
                if (!stopWords.includes(word) && !parasiteIndices.has(match.index) && !montageIndices.has(match.index) && !ignoredRepeats.has(word)) {
                    if (lastSeenAt[word] && (wordCounter - lastSeenAt[word].count <= 70)) {
                        for (let i = 0; i < word.length; i++) { badRepeatIndices.add(match.index + i); badRepeatIndices.add(lastSeenAt[word].pos + i); }
                        repeatCounts[word] = (repeatCounts[word] || 0) + 1;
                    }
                    lastSeenAt[word] = { count: wordCounter, pos: match.index };
                }
            }

            const wordCount = (text.match(/[a-zA-Zàâäéèêëîïôöûüùç]+/g) || []).length;
            const wpm = parseInt(document.getElementById('wpm-slider').value) || 150;
            const totalSeconds = Math.round((wordCount / wpm) * 60);
            document.getElementById('duration-display').innerText = `${Math.floor(totalSeconds / 60)}m ${totalSeconds % 60}s`;

            let focusIndices = new Set();
            if (activeFocusWord) {
                const escaped = activeFocusWord.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                const fRegex = new RegExp(`\\b(${escaped})\\b`, 'gi');
                let fMatch; while ((fMatch = fRegex.exec(text)) !== null) { for (let i = 0; i < fMatch[0].length; i++) focusIndices.add(fMatch.index + i); }
            }

            // Map suggestions
            let commentMap = {};
            comments.forEach(c => { if(!commentMap[c.index]) commentMap[c.index] = []; commentMap[c.index].push(c); });

            let finalHtml = ""; let i = 0;
            while (i <= text.length) {
                if (commentMap[i]) {
                    commentMap[i].forEach(com => {
                        finalHtml += `<span class="comment-dot" onclick="showComment('${com.id}', event)"></span>`;
                    });
                }
                if (i === text.length) break;

                let className = "";
                if (montageIndices.has(i)) className = "montage";
                else if (focusIndices.has(i)) className = "focus-active";
                else if (parasiteIndices.has(i)) className = "parasite";
                else if (badRepeatIndices.has(i)) className = "repeat";
                
                if (className) {
                    finalHtml += `<mark class="${className}">`;
                    while (i < text.length && ((className === "montage" && montageIndices.has(i)) || (className === "focus-active" && focusIndices.has(i)) || (className === "parasite" && parasiteIndices.has(i)) || (className === "repeat" && badRepeatIndices.has(i)))) {
                        finalHtml += text[i].replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); i++;
                        if (commentMap[i]) break; 
                    }
                    finalHtml += `</mark>`;
                } else { finalHtml += text[i].replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); i++; }
            }
            highlightLayer.innerHTML = finalHtml + (text.endsWith('\n') ? '\n ' : '');
            
            document.getElementById('total-parasites').innerText = totalParasites;
            document.getElementById('total-repeats').innerText = Object.keys(repeatCounts).length;
            document.getElementById('total-words').innerText = wordCount;
            document.getElementById('focus-display').innerText = activeFocusWord || "Aucun";
            updateSidebars(parasiteCounts, repeatCounts);
            autoSave();
        }

        function setStep(step) {
            currentStep = step;
            document.querySelectorAll('.wf-tab').forEach(t => t.classList.remove('active'));
            document.getElementById(`wf-tab-${step}`).classList.add('active');
            const s1 = document.getElementById('step-1-view'), s2 = document.getElementById('step-2-view'), s3 = document.getElementById('step-3-view');
            const mainCol = document.getElementById('main-column'), analysisCol = document.getElementById('analysis-column'), statsRow = document.getElementById('stats-row');
            [s1, s2, s3].forEach(el => el.classList.add('hidden'));
            if (step === 1) { s1.classList.remove('hidden'); mainCol.classList.replace('lg:col-span-8', 'lg:col-span-12'); analysisCol.classList.add('hidden'); statsRow.classList.add('hidden'); renderDraft(); }
            else if (step === 2) { s2.classList.remove('hidden'); mainCol.classList.replace('lg:col-span-8', 'lg:col-span-12'); analysisCol.classList.add('hidden'); statsRow.classList.add('hidden'); renderTimeline(); }
            else if (step === 3) { s3.classList.remove('hidden'); mainCol.classList.replace('lg:col-span-12', 'lg:col-span-8'); analysisCol.classList.remove('hidden'); statsRow.classList.remove('hidden'); process(); }
        }

        // --- FIREBASE SYNC ---

        auth.onAuthStateChanged(async (user) => {
            currentUser = user;
            if (user) {
                document.getElementById('auth-btn-text').innerText = "Déconnexion";
                document.getElementById('user-display').innerText = user.displayName || user.email;
                document.getElementById('share-btn').style.display = 'flex';
                document.getElementById('projects-nav').classList.remove('hidden');
                const urlParams = new URLSearchParams(window.location.search);
                const inviteToken = urlParams.get('invite');
                if (inviteToken) { await consumeInvite(inviteToken); window.history.replaceState({}, document.title, window.location.pathname); }
                switchProject(1);
                listenToSharedScripts();
            } else {
                currentScriptId = null;
                document.getElementById('auth-btn-text').innerText = "Connexion";
                document.getElementById('user-display').innerText = "Mode Local";
                setStep(1);
            }
        });

        async function switchProject(index) {
            if (!currentUser) return;
            document.querySelectorAll('.project-tab').forEach(t => { t.classList.remove('active'); t.style.backgroundColor = "transparent"; });
            const activeTab = document.getElementById(`p-tab-${index}`);
            if(activeTab) { activeTab.classList.add('active'); activeTab.style.backgroundColor = "var(--accent-color)"; loadScript(`${currentUser.uid}_${index}`); }
        }

        function loadScript(id) {
            if (scriptListener) scriptListener();
            currentScriptId = id;
            scriptListener = db.collection('scripts').doc(id).onSnapshot(doc => {
                if (!doc.exists) {
                    if (id.startsWith(currentUser.uid)) { 
                        db.collection('scripts').doc(id).set({ content: "", bubbles: [], comments: [], title: `Projet ${id.split('_')[1]}`, owner: currentUser.uid, ownerEmail: currentUser.email, editors: [], viewers: [], commenters: [], ignoredWords: [], lastUpdated: firebase.firestore.FieldValue.serverTimestamp() }); 
                    }
                    return;
                }
                const data = doc.data();
                if (data.content !== textarea.value && document.activeElement !== textarea) textarea.value = data.content || "";
                if (JSON.stringify(data.bubbles) !== JSON.stringify(bubbles)) { bubbles = data.bubbles || []; currentStep === 1 ? renderDraft() : renderTimeline(); }
                comments = data.comments || [];
                
                if (data.owner === currentUser.uid) userRole = 'owner';
                else if (data.editors?.includes(currentUser.email)) userRole = 'editors';
                else if (data.commenters?.includes(currentUser.email)) userRole = 'commenters';
                else userRole = 'viewers';
                
                applyRoleSecurity();
                const slotMatch = id.match(/_([1-4])$/); 
                if (slotMatch && data.owner === currentUser.uid) { const tab = document.getElementById(`p-tab-${slotMatch[1]}`); if (tab) tab.innerText = data.title; }
                if (userRole === 'owner') updateCollaboratorsUI(data);
                ignoredRepeats = new Set(data.ignoredWords || []);
                process();
            });
        }

        function applyRoleSecurity() {
            const isRestricted = (userRole === 'viewers' || userRole === 'commenters');
            textarea.readOnly = isRestricted;
            bubbleInput.disabled = isRestricted;
            document.getElementById('add-bubble-btn').disabled = isRestricted;
            document.getElementById('role-display').innerText = userRole === 'owner' ? 'Propriétaire' : (userRole === 'editors' ? 'Éditeur' : (userRole === 'commenters' ? 'Commentateur' : 'Lecteur'));
        }

        function listenToSharedScripts() {
            const email = currentUser.email;
            db.collection('scripts').where('editors', 'array-contains', email).onSnapshot(syncSharedTabs);
            db.collection('scripts').where('commenters', 'array-contains', email).onSnapshot(syncSharedTabs);
            db.collection('scripts').where('viewers', 'array-contains', email).onSnapshot(syncSharedTabs);
        }

        function syncSharedTabs(snap) {
            const tabsContainer = document.getElementById('tabs-container');
            snap.forEach(doc => {
                const data = doc.data();
                const tabId = `p-tab-shared-${doc.id}`;
                if (!document.getElementById(tabId)) {
                    const btn = document.createElement('button'); btn.id = tabId;
                    btn.className = "project-tab px-4 py-2 rounded-xl text-[10px] font-bold uppercase transition";
                    btn.innerText = `🤝 ${data.title}`; btn.onclick = () => openSharedProject(doc.id);
                    tabsContainer.appendChild(btn);
                }
            });
        }

        function openSharedProject(id) {
            document.querySelectorAll('.project-tab').forEach(t => { t.classList.remove('active'); t.style.backgroundColor = "transparent"; });
            loadScript(id);
        }

        let saveTimeout;
        function autoSave() {
            if (userRole === 'viewers' || userRole === 'commenters') return;
            if (currentUser && currentScriptId) {
                clearTimeout(saveTimeout);
                saveTimeout = setTimeout(() => {
                    db.collection('scripts').doc(currentScriptId).update({ 
                        bubbles: bubbles,
                        content: textarea.value, 
                        comments: comments,
                        ignoredWords: Array.from(ignoredRepeats), 
                        lastUpdated: firebase.firestore.FieldValue.serverTimestamp() 
                    })
                    .then(() => { const s = document.getElementById('save-status'); s.style.opacity = '1'; setTimeout(() => s.style.opacity = '0', 1000); });
                }, 800);
            }
        }

        async function generateInviteLink() {
            const role = document.getElementById('share-role').value;
            const inviteRef = await db.collection('invites').add({ scriptId: currentScriptId, role: role, createdBy: currentUser.email, used: false, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
            const inviteURL = `${window.location.origin}${window.location.pathname}?invite=${inviteRef.id}`;
            await navigator.clipboard.writeText(inviteURL); alert("Lien copié !"); toggleShareModal();
        }

        async function consumeInvite(tokenId) {
            const doc = await db.collection('invites').doc(tokenId).get();
            if (doc.exists && !doc.data().used) {
                const data = doc.data();
                await db.collection('scripts').doc(data.scriptId).update({ [data.role]: firebase.firestore.FieldValue.arrayUnion(currentUser.email) });
                await db.collection('invites').doc(tokenId).update({ used: true, usedBy: currentUser.email });
                alert("Accès autorisé !");
            }
        }

        function updateSidebars(pCounts, rCounts) {
            const pList = document.getElementById('word-list'); const rList = document.getElementById('repeat-list');
            pList.innerHTML = Object.entries(pCounts).sort((a,b)=>b[1]-a[1]).map(([w,c])=>`<li onclick="toggleFocus(\`${w.replace(/`/g, "\\`")}\`)" class="sidebar-item flex justify-between uppercase font-bold p-2 bg-slate-800/50 rounded-lg mb-1"><span>${w}</span><span style="color: var(--accent-color);">${c}</span></li>`).join('') || 'RAS';
            rList.innerHTML = Object.entries(rCounts).sort((a,b)=>b[1]-a[1]).map(([w,c])=>`<li class="sidebar-item flex justify-between items-center uppercase font-bold p-2 bg-slate-800/50 rounded-lg mb-1"><span onclick="toggleFocus(\`${w.replace(/`/g, "\\`")}\`)" class="flex-1 truncate">${w}</span><div class="flex items-center gap-2"><span class="text-amber-500">${c+1}x</span><button onclick="ignoreWord('${w}')" class="ignore-btn">✕</button></div></li>`).join('') || 'RAS';
            if (ignoredRepeats.size > 0) { document.getElementById('ignored-section').classList.remove('hidden'); document.getElementById('ignored-list').innerHTML = Array.from(ignoredRepeats).map(w => `<li onclick="unignoreWord('${w}')" class="bg-red-500/20 text-red-400 px-2 py-1 rounded cursor-pointer">#${w}</li>`).join(''); } else document.getElementById('ignored-section').classList.add('hidden');
        }

        function updateCollaboratorsUI(data) {
            const list = document.getElementById('collaborators-list'); list.innerHTML = "";
            const roles = [{k:'editors',l:'Éditeur'}, {k:'commenters',l:'Commentateur'}, {k:'viewers',l:'Lecteur'}];
            roles.forEach(r => {
                (data[r.k] || []).forEach(email => {
                    const li = document.createElement('li'); li.className = "flex justify-between items-center bg-slate-800/40 p-2 rounded-lg border border-slate-700";
                    li.innerHTML = `<div class="flex flex-col"><span class="font-bold truncate max-w-[100px] text-[10px]">${email.split('@')[0]}</span><span class="text-[8px] text-slate-500 uppercase">${r.l}</span></div><button onclick="removeCollaborator('${email}', '${r.k}')" class="text-slate-500 hover:text-red-500 px-2">✕</button>`;
                    list.appendChild(li);
                });
            });
        }

        async function removeCollaborator(e, r) { if (confirm(`Retirer ${e} ?`)) await db.collection('scripts').doc(currentScriptId).update({ [r]: firebase.firestore.FieldValue.arrayRemove(e) }); }
        async function renameCurrentProject() { const n = prompt("Nouveau nom :"); if(n) await db.collection('scripts').doc(currentScriptId).update({ title: n }); }
        function toggleFocus(w) { activeFocusWord = (activeFocusWord === w) ? null : w; process(); }
        function ignoreWord(w) { ignoredRepeats.add(w.toLowerCase()); autoSave(); process(); }
        function unignoreWord(w) { ignoredRepeats.delete(w); autoSave(); process(); }
        function copyText() { navigator.clipboard.writeText(textarea.value); alert("Copié !"); }
        function downloadText() { const blob = new Blob([textarea.value], { type: 'text/plain' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `script.txt`; a.click(); }
        function toggleShareModal() { document.getElementById('share-modal').style.display = (document.getElementById('share-modal').style.display === 'flex') ? 'none' : 'flex'; }

        window.onload = () => {
            bubblePalette.forEach(t => {
                const b = document.createElement('button'); b.className = 'w-4 h-4 rounded-full border border-white/20 hover:scale-125 transition'; b.style.backgroundColor = t;
                b.onclick = () => { 
                    document.documentElement.style.setProperty('--accent-color', t); 
                    document.documentElement.style.setProperty('--accent-soft', t + '26');
                    process(); if(currentStep === 1) renderDraft(); else if(currentStep === 2) renderTimeline();
                };
                document.getElementById('theme-picker').appendChild(b);
            });
            textarea.addEventListener('input', process);
            setStep(1);
        };
    </script>
</body>
</html>
