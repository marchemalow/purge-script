<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purge-Script Pro | Cloud Collaboration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --accent-color: #6366f1; --accent-soft: rgba(99, 102, 241, 0.15); --focus-color: #f02e65; --montage-color: #7dd3fc; }
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s ease; }
        .editor-font { font-family: 'IBM Plex Sans', sans-serif; font-size: 1.05rem; line-height: 1.6; }
        .editor-container { position: relative; min-height: 600px; border-radius: 1.5rem; background: white; }
        .sync-text { position: absolute; top: 0; left: 0; width: 100%; height: 100%; padding: 30px; white-space: pre-wrap; word-wrap: break-word; overflow-y: auto; border: none; margin: 0; background: transparent; }
        #textarea { color: transparent; caret-color: #1e293b; z-index: 2; resize: none; outline: none; }
        #highlight-layer { z-index: 1; pointer-events: none; color: #1e293b; }
        mark { background: none; color: inherit; }
        .show-parasites mark.parasite { background-color: var(--accent-soft); border-bottom: 2px solid var(--accent-color); border-radius: 2px; }
        .show-repeats mark.repeat { background-color: rgba(245, 158, 11, 0.15); border-bottom: 2px solid #f59e0b; border-radius: 2px; }
        mark.focus-active { background-color: rgba(240, 46, 101, 0.3) !important; border-bottom: 2px solid var(--focus-color) !important; font-weight: 600; }
        .show-montage mark.montage { background-color: var(--montage-color) !important; color: #0369a1 !important; font-weight: 700; }
        .sidebar-item { cursor: pointer; transition: all 0.2s; }
        .sidebar-item:hover { background-color: rgba(255,255,255,0.1); }
        .sidebar-item.active-focus { border: 1px solid var(--focus-color); background-color: rgba(240, 46, 101, 0.2) !important; }
        body.dark-mode { background-color: #0f172a; color: #f1f5f9; }
        .dark-mode .bg-white { background-color: #1e293b; border-color: #334155; }
        .dark-mode .text-slate-900 { color: #f8fafc; }
        .dark-mode .border-slate-200 { border-color: #334155; }
        .dark-mode #highlight-layer { color: #e2e8f0 !important; }
        .dark-mode #textarea { caret-color: #ffffff; }
        .switch { position: relative; display: inline-block; width: 34px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent-color); }
        input:checked + .slider:before { transform: translateX(14px); }
        #wpm-slider { accent-color: var(--accent-color); }
        #share-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 50; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal-content { background: white; padding: 2rem; border-radius: 1.5rem; width: 90%; max-width: 400px; }
        .dark-mode .modal-content { background: #1e293b; color: white; border-color: #334155; }
        .project-tab.active { color: white; background-color: var(--accent-color); }
    </style>
</head>
<body class="text-slate-800 bg-slate-50">

    <div id="share-modal">
        <div class="modal-content shadow-2xl border border-slate-200">
            <h3 class="text-xl font-extrabold mb-2">Partager ce script</h3>
            <p class="text-xs text-slate-500 mb-6">Travaillez à plusieurs sur le même texte.</p>
            <label class="text-[10px] font-bold uppercase text-slate-400 mb-1 block">Email du collaborateur</label>
            <input type="email" id="share-email" placeholder="exemple@gmail.com" class="w-full p-4 rounded-xl border mb-4 dark:bg-slate-800 dark:border-slate-700 outline-none focus:border-indigo-500 transition">
            <label class="text-[10px] font-bold uppercase text-slate-400 mb-1 block">Permission</label>
            <select id="share-role" class="w-full p-4 rounded-xl border mb-8 dark:bg-slate-800 dark:border-slate-700 outline-none">
                <option value="editors">Éditeur (Peut modifier)</option>
                <option value="viewers">Lecteur (Lecture seule)</option>
            </select>
            <div class="flex gap-3">
                <button onclick="confirmShare()" class="flex-1 bg-indigo-500 hover:bg-indigo-600 text-white py-4 rounded-2xl font-bold text-sm transition" style="background-color: var(--accent-color);">Inviter</button>
                <button onclick="toggleShareModal()" class="flex-1 bg-slate-100 dark:bg-slate-700 py-4 rounded-2xl font-bold text-sm">Annuler</button>
            </div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto px-6 py-10">
        <header class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-10 border-b border-slate-200 dark:border-slate-700 pb-8">
            <div>
                <div class="flex items-center gap-3">
                    <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Purge-Script<span class="text-[var(--accent-color)]">.</span></h1>
                    <span id="save-status" class="text-[10px] uppercase font-bold transition-opacity" style="color: var(--accent-color); opacity: 0;">En direct</span>
                </div>
                <p class="text-slate-500 text-sm font-medium italic mt-1"><span id="user-display">Mode Local</span></p>
            </div>
            <div class="flex flex-wrap items-center gap-4">
                <button id="share-btn" onclick="toggleShareModal()" class="hidden items-center gap-2 px-5 py-2.5 text-white rounded-xl text-xs font-bold hover:scale-105 transition shadow-lg" style="background-color: var(--accent-color);">Partager</button>
                <button id="auth-btn" onclick="handleAuth()" class="flex items-center gap-2 px-4 py-2 bg-white dark:bg-slate-800 border border-slate-200 rounded-xl text-xs font-bold shadow-sm transition"><span id="auth-btn-text">Se connecter</span></button>
                <div class="flex gap-4 bg-white dark:bg-slate-800 p-3 rounded-2xl border border-slate-200 shadow-sm text-[10px] font-bold uppercase">
                    <div class="flex items-center gap-2"><span>Tics</span><label class="switch"><input type="checkbox" id="toggle-parasites" checked onchange="process()"><span class="slider"></span></label></div>
                    <div class="flex items-center gap-2 border-l pl-4 border-slate-200"><span>Répé.</span><label class="switch"><input type="checkbox" id="toggle-repeats" checked onchange="process()"><span class="slider"></span></label></div>
                </div>
                <div class="bg-white dark:bg-slate-800 p-3 rounded-2xl shadow-sm border border-slate-200 flex items-center gap-4">
                    <button onclick="toggleDarkMode()" class="p-2.5 rounded-xl bg-slate-100 dark:bg-slate-700 hover:scale-105 transition">
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
                    </button>
                    <div class="flex flex-wrap gap-1.5 max-w-[100px]" id="theme-picker"></div>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-12 grid grid-cols-2 md:grid-cols-5 gap-4">
                <div class="bg-white dark:bg-slate-800 p-5 rounded-3xl border border-slate-200 shadow-sm">
                    <p class="text-slate-400 text-[10px] font-bold uppercase mb-1">Tics</p>
                    <p id="total-parasites" class="text-2xl font-extrabold" style="color: var(--accent-color);">0</p>
                </div>
                <div class="bg-white dark:bg-slate-800 p-5 rounded-3xl border border-slate-200 shadow-sm">
                    <p class="text-slate-400 text-[10px] font-bold uppercase mb-1">Répétitions</p>
                    <p id="total-repeats" class="text-2xl font-extrabold text-amber-500">0</p>
                </div>
                <div class="bg-white dark:bg-slate-800 p-5 rounded-3xl border border-slate-200 shadow-sm">
                    <p class="text-slate-400 text-[10px] font-bold uppercase mb-1">Total Mots</p>
                    <p id="total-words" class="text-2xl font-extrabold">0</p>
                </div>
                <div class="bg-white dark:bg-slate-800 p-5 rounded-3xl border border-slate-200 shadow-sm">
                    <p class="text-slate-400 text-[10px] font-bold uppercase mb-1">Durée Estimée</p>
                    <p id="duration-display" class="text-2xl font-extrabold" style="color: var(--accent-color);">0s</p>
                </div>
                <div class="bg-white dark:bg-slate-800 p-5 rounded-3xl border border-slate-200 shadow-sm border-l-4 border-l-slate-800">
                    <p class="text-slate-400 text-[10px] font-bold uppercase mb-1">Focus Actif</p>
                    <p id="focus-display" class="text-xl font-extrabold text-zinc-300">Aucun</p>
                </div>
            </div>

            <div class="lg:col-span-8 space-y-4">
                <div id="projects-nav" class="hidden flex items-center justify-between bg-white dark:bg-slate-800 p-2 rounded-2xl border border-slate-200 shadow-sm">
                    <div class="flex gap-2" id="tabs-container">
                        <button onclick="switchProject(1)" id="p-tab-1" class="project-tab px-4 py-2 rounded-xl text-[10px] font-bold uppercase transition">Projet 1</button>
                        <button onclick="switchProject(2)" id="p-tab-2" class="project-tab px-4 py-2 rounded-xl text-[10px] font-bold uppercase transition">Projet 2</button>
                        <button onclick="switchProject(3)" id="p-tab-3" class="project-tab px-4 py-2 rounded-xl text-[10px] font-bold uppercase transition">Projet 3</button>
                        <button onclick="switchProject(4)" id="p-tab-4" class="project-tab px-4 py-2 rounded-xl text-[10px] font-bold uppercase transition">Projet 4</button>
                    </div>
                    <button id="rename-btn" onclick="renameCurrentProject()" class="p-2 text-slate-400 hover:text-indigo-500 transition ml-4">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                    </button>
                </div>

                <div class="bg-white dark:bg-slate-800 p-4 rounded-2xl border border-slate-200 flex items-center gap-4 text-xs font-bold uppercase">
                    <span class="text-slate-500">Débit :</span>
                    <input type="range" id="wpm-slider" min="100" max="250" value="150" class="flex-1" oninput="updateWpmDisplay(this.value); process();">
                    <span id="wpm-value" class="w-12" style="color: var(--accent-color);">150</span>
                </div>

                <div id="editor-wrapper" class="editor-container border border-slate-200 shadow-sm overflow-hidden bg-white show-parasites show-repeats show-montage">
                    <div id="highlight-layer" class="sync-text editor-font"></div>
                    <textarea id="textarea" class="sync-text editor-font" placeholder="Écrivez ici..." spellcheck="false"></textarea>
                </div>
                
                <div class="flex gap-4">
                    <button onclick="copyText()" class="text-white px-8 py-3.5 rounded-2xl font-bold shadow-lg uppercase text-xs tracking-widest hover:scale-105 transition" style="background-color: var(--accent-color);">Copier</button>
                    <button onclick="downloadText()" class="bg-slate-900 text-white px-8 py-3.5 rounded-2xl font-bold shadow-lg uppercase text-xs tracking-widest transition">Exporter</button>
                    <button onclick="clearText()" class="text-slate-400 hover:text-red-500 font-bold transition text-xs uppercase px-4">Effacer</button>
                </div>
            </div>

            <div class="lg:col-span-4 space-y-6">
                <div class="bg-slate-900 text-white p-7 rounded-[2rem] shadow-xl space-y-8">
                    <div><h2 class="text-[9px] font-bold uppercase text-slate-500 mb-4">Tics</h2><ul id="word-list" class="space-y-1 max-h-40 overflow-y-auto pr-2 text-[11px]"></ul></div>
                    <div><h2 class="text-[9px] font-bold uppercase text-slate-500 mb-4">Répétitions</h2><ul id="repeat-list" class="space-y-1 max-h-40 overflow-y-auto pr-2 text-[11px]"></ul></div>
                    <div id="ignored-section" class="hidden"><h2 class="text-[9px] font-bold uppercase text-red-400 mb-4">Ignorés</h2><ul id="ignored-list" class="flex flex-wrap gap-2 text-[10px]"></ul></div>
                    <div id="collaborators-section" class="hidden border-t border-slate-700 pt-6"><h2 class="text-[9px] font-bold uppercase text-indigo-400 mb-4">Collaborateurs</h2><ul id="collaborators-list" class="space-y-2 text-[11px]"></ul></div>
                    <div id="shared-scripts-container" class="hidden border-t border-slate-700 pt-6"><h2 class="text-[9px] font-bold uppercase text-slate-500 mb-4">Partagés</h2><ul id="shared-list" class="space-y-2 text-[11px]"></ul></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyCPI5JRtaODgMbhpvmb5jJ9pGaEOFms8sI", 
            authDomain: "script-p-6c6df.firebaseapp.com", 
            projectId: "script-p-6c6df", 
            storageBucket: "script-p-6c6df.firebasestorage.app", 
            messagingSenderId: "792026086516", 
            appId: "1:792026086516:web:cf2882d0bd6e770db7a521" 
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const parasiteDictionary = ["du coup", "en fait", "voilà", "un petit peu", "euh", "globalement", "concrètement", "effectivement", "donc", "c'est-à-dire", "au final", "disons que", "typiquement", "clairement", "tout simplement", "en gros", "pour le coup", "un peu", "voilà quoi", "tu vois", "franchement", "honnêtement", "en réalité", "pour ainsi dire", "alors", "en quelque sorte", "justement", "au niveau de", "quelque part", "on va dire", "fondamentalement", "véritablement", "pour ma part", "en soi", "entre guillemets", "si vous voulez", "de base", "sur la fin"];
        const stopWords = ["je", "me", "moi", "tu", "te", "toi", "il", "elle", "on", "nous", "vous", "ils", "elles", "le", "la", "les", "un", "une", "des", "du", "de", "ce", "cet", "cette", "ces", "se", "soi", "lui", "leur", "y", "en", "mon", "ton", "son", "ma", "ta", "sa", "mes", "tes", "ses", "notre", "votre", "nos", "vos", "leurs", "qui", "que", "quoi", "dont", "où", "quel", "quels", "quelle", "quelles", "et", "ou", "mais", "est", "sont", "pour", "dans", "par", "avec", "pas", "ne", "si", "ici", "là", "ont", "aux", "très"];

        let activeFocusWord = null; let currentUser = null; let currentScriptId = null; let userRole = 'owner'; 
        let ignoredRepeats = new Set(); let scriptListener = null; let lastRemoteContent = "";

        const textarea = document.getElementById('textarea');
        const highlightLayer = document.getElementById('highlight-layer');
        const editorWrapper = document.getElementById('editor-wrapper');

        function updateWpmDisplay(v) { document.getElementById('wpm-value').innerText = v; }
        function handleAuth() { if (currentUser) auth.signOut(); else auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }

        auth.onAuthStateChanged(user => {
            currentUser = user;
            if (user) {
                document.getElementById('auth-btn-text').innerText = "Déconnexion";
                document.getElementById('user-display').innerText = user.displayName;
                document.getElementById('share-btn').style.display = 'flex';
                document.getElementById('shared-scripts-container').classList.remove('hidden');
                document.getElementById('projects-nav').classList.remove('hidden');
                switchProject(1);
                listenToSharedScripts();
            } else {
                currentScriptId = null;
                document.getElementById('auth-btn-text').innerText = "Se connecter";
                document.getElementById('user-display').innerText = "Mode Local";
                textarea.value = localStorage.getItem('purge-content') || "";
                process();
            }
        });

        async function switchProject(index) {
            if (!currentUser) return;
            removeSharedTab();
            document.querySelectorAll('.project-tab').forEach(t => { t.classList.remove('active'); t.style.backgroundColor = "transparent"; });
            const activeTab = document.getElementById(`p-tab-${index}`);
            activeTab.classList.add('active');
            activeTab.style.backgroundColor = "var(--accent-color)";
            loadScript(`${currentUser.uid}_${index}`);
        }

        async function openSharedProject(id, title) {
            removeSharedTab();
            const tabsContainer = document.getElementById('tabs-container');
            const sharedTab = document.createElement('button');
            sharedTab.id = 'p-tab-shared';
            sharedTab.className = 'project-tab active px-4 py-2 rounded-xl text-[10px] font-bold uppercase transition';
            sharedTab.style.backgroundColor = "var(--accent-color)";
            sharedTab.innerText = `🤝 ${title}`;
            document.querySelectorAll('.project-tab').forEach(t => { t.classList.remove('active'); t.style.backgroundColor = "transparent"; });
            tabsContainer.appendChild(sharedTab);
            loadScript(id);
        }

        function removeSharedTab() { const el = document.getElementById('p-tab-shared'); if (el) el.remove(); }

        function loadScript(id) {
            if (scriptListener) scriptListener();
            currentScriptId = id;
            scriptListener = db.collection('scripts').doc(id).onSnapshot(doc => {
                if (!doc.exists) {
                    if (id.startsWith(currentUser.uid)) {
                        db.collection('scripts').doc(id).set({ content: "", title: `Projet ${id.split('_')[1]}`, owner: currentUser.uid, ownerEmail: currentUser.email, editors: [], viewers: [], ignoredWords: [], lastUpdated: firebase.firestore.FieldValue.serverTimestamp() });
                    }
                    return;
                }
                const data = doc.data();
                const isOwner = data.owner === currentUser.uid;
                const isEditor = data.editors?.includes(currentUser.email);
                const isViewer = data.viewers?.includes(currentUser.email);
                if (!isOwner && !isEditor && !isViewer) { alert("Accès révoqué."); switchProject(1); return; }
                lastRemoteContent = data.content || "";
                if (data.content !== textarea.value) {
                    if (document.activeElement !== textarea || isViewer) {
                        const start = textarea.selectionStart; const end = textarea.selectionEnd;
                        textarea.value = data.content; textarea.setSelectionRange(start, end);
                    }
                }
                userRole = isOwner ? 'owner' : (isEditor ? 'editor' : 'viewer');
                textarea.readOnly = (userRole === 'viewer');
                document.getElementById('rename-btn').style.display = isOwner ? 'block' : 'none';
                if (isOwner) {
                    updateCollaboratorsUI(data);
                    const slotMatch = id.match(/_([1-4])$/);
                    if (slotMatch) document.getElementById(`p-tab-${slotMatch[1]}`).innerText = data.title;
                } else {
                    document.getElementById('collaborators-section').classList.add('hidden');
                    const sTab = document.getElementById('p-tab-shared');
                    if(sTab) sTab.innerText = `🤝 ${data.title}`;
                }
                ignoredRepeats = new Set(data.ignoredWords || []);
                process();
            });
        }

        function listenToSharedScripts() {
            db.collection('scripts').where('editors', 'array-contains', currentUser.email).onSnapshot(snap => updateSharedUI(snap, 'éditeur'));
            db.collection('scripts').where('viewers', 'array-contains', currentUser.email).onSnapshot(snap => updateSharedUI(snap, 'lecteur'));
        }

        function updateSharedUI(snap, role) {
            const list = document.getElementById('shared-list');
            document.querySelectorAll(`.shared-item-${role}`).forEach(el => el.remove());
            snap.forEach(doc => {
                const data = doc.data();
                const li = document.createElement('li');
                li.className = `shared-item-${role} p-3 bg-slate-800/50 border border-slate-700 rounded-xl cursor-pointer hover:bg-indigo-900/40 transition flex justify-between items-center`;
                li.innerHTML = `<span>${data.title}</span> <span class="text-[8px] bg-slate-700 px-2 py-1 rounded-md uppercase">${role}</span>`;
                li.onclick = () => openSharedProject(doc.id, data.title);
                list.appendChild(li);
            });
        }

        function process() {
            const text = textarea.value;
            const showP = document.getElementById('toggle-parasites').checked;
            const showR = document.getElementById('toggle-repeats').checked;
            editorWrapper.classList.toggle('show-parasites', showP);
            editorWrapper.classList.toggle('show-repeats', showR);
            let montageIndices = new Set();
            const montageRegex = /\[.*?\]/g;
            let mMatch; while ((mMatch = montageRegex.exec(text)) !== null) { for (let i = 0; i < mMatch[0].length; i++) montageIndices.add(mMatch.index + i); }
            let parasiteIndices = new Set(); let parasiteCounts = {}; let totalParasites = 0;
            parasiteDictionary.forEach(word => {
                const regex = new RegExp(`\\b(${word})\\b`, 'gi');
                let match; while ((match = regex.exec(text)) !== null) {
                    if (montageIndices.has(match.index)) continue;
                    totalParasites++; parasiteCounts[word.toLowerCase()] = (parasiteCounts[word.toLowerCase()] || 0) + 1;
                    for (let i = 0; i < match[0].length; i++) parasiteIndices.add(match.index + i);
                }
            });
            const wordRegex = /[a-zA-ZàâäéèêëîïôöûüùçÀÂÄÉÈÊËÎÏÔÖÛÜÙÇ]{3,}/g;
            let lastSeenAt = {}; let badRepeatIndices = new Set(); let repeatCounts = {}; let wordCounter = 0; let match;
            while ((match = wordRegex.exec(text)) !== null) {
                wordCounter++; const word = match[0].toLowerCase();
                if (!stopWords.includes(word) && !parasiteIndices.has(match.index) && !montageIndices.has(match.index) && !ignoredRepeats.has(word)) {
                    if (lastSeenAt[word] && (wordCounter - lastSeenAt[word].count <= 70)) {
                        for (let i = 0; i < word.length; i++) { badRepeatIndices.add(match.index + i); badRepeatIndices.add(lastSeenAt[word].pos + i); }
                        repeatCounts[word] = (repeatCounts[word] || 0) + 1;
                    }
                    lastSeenAt[word] = { count: wordCounter, pos: match.index };
                }
            }
            const wpm = parseInt(document.getElementById('wpm-slider').value) || 150;
            const wordCount = (text.match(/[a-zA-Zàâäéèêëîïôöûüùç]+/g) || []).length;
            const totalSeconds = Math.round((wordCount / wpm) * 60);
            document.getElementById('duration-display').innerText = `${Math.floor(totalSeconds / 60)}m ${totalSeconds % 60}s`;
            let focusIndices = new Set();
            if (activeFocusWord) {
                const escaped = activeFocusWord.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                const fRegex = new RegExp(`\\b(${escaped})\\b`, 'gi');
                let fMatch; while ((fMatch = fRegex.exec(text)) !== null) { for (let i = 0; i < fMatch[0].length; i++) focusIndices.add(fMatch.index + i); }
            }
            let finalHtml = ""; let i = 0;
            while (i < text.length) {
                let className = "";
                if (montageIndices.has(i)) className = "montage";
                else if (focusIndices.has(i)) className = "focus-active";
                else if (parasiteIndices.has(i)) className = "parasite";
                else if (badRepeatIndices.has(i)) className = "repeat";
                if (className) {
                    finalHtml += `<mark class="${className}">`;
                    while (i < text.length && ((className === "montage" && montageIndices.has(i)) || (className === "focus-active" && focusIndices.has(i)) || (className === "parasite" && parasiteIndices.has(i)) || (className === "repeat" && badRepeatIndices.has(i)))) {
                        finalHtml += text[i].replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); i++;
                    }
                    finalHtml += `</mark>`;
                } else { finalHtml += text[i].replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); i++; }
            }
            highlightLayer.innerHTML = finalHtml + (text.endsWith('\n') ? '\n ' : '');
            document.getElementById('total-parasites').innerText = totalParasites;
            document.getElementById('total-repeats').innerText = Object.keys(repeatCounts).length;
            document.getElementById('total-words').innerText = wordCount;
            document.getElementById('focus-display').innerText = activeFocusWord || "Aucun";
            updateSidebars(parasiteCounts, repeatCounts);
            autoSave();
        }

        function updateSidebars(pCounts, rCounts) {
            const pList = document.getElementById('word-list'); const rList = document.getElementById('repeat-list');
            pList.innerHTML = Object.entries(pCounts).sort((a,b)=>b[1]-a[1]).map(([w,c])=>`<li onclick="toggleFocus(\`${w.replace(/`/g, "\\`")}\`)" class="sidebar-item flex justify-between uppercase font-bold p-2 bg-slate-800/50 rounded-lg mb-1"><span>${w}</span><span style="color: var(--accent-color);">${c}</span></li>`).join('') || 'RAS';
            rList.innerHTML = Object.entries(rCounts).sort((a,b)=>b[1]-a[1]).map(([w,c])=>`<li class="sidebar-item flex justify-between items-center uppercase font-bold p-2 bg-slate-800/50 rounded-lg mb-1"><span onclick="toggleFocus(\`${w.replace(/`/g, "\\`")}\`)" class="flex-1">${w}</span><div class="flex items-center gap-2"><span class="text-amber-500">${c+1}x</span><button onclick="ignoreWord('${w}')" class="ignore-btn">✕</button></div></li>`).join('') || 'RAS';
            const iSection = document.getElementById('ignored-section');
            if (ignoredRepeats.size > 0) { iSection.classList.remove('hidden'); document.getElementById('ignored-list').innerHTML = Array.from(ignoredRepeats).map(w => `<li onclick="unignoreWord('${w}')" class="bg-red-500/20 text-red-400 px-2 py-1 rounded cursor-pointer">#${w}</li>`).join(''); } else iSection.classList.add('hidden');
        }

        let saveTimeout;
        function autoSave() {
            if (userRole === 'viewer' || textarea.value === lastRemoteContent) return;
            localStorage.setItem('purge-content', textarea.value);
            if (currentUser && currentScriptId) {
                clearTimeout(saveTimeout);
                saveTimeout = setTimeout(() => {
                    db.collection('scripts').doc(currentScriptId).update({ content: textarea.value, ignoredWords: Array.from(ignoredRepeats), lastUpdated: firebase.firestore.FieldValue.serverTimestamp() })
                    .then(() => { const s = document.getElementById('save-status'); s.style.opacity = '1'; setTimeout(() => s.style.opacity = '0', 1000); });
                }, 500);
            }
        }

        function toggleFocus(w) { activeFocusWord = (activeFocusWord === w) ? null : w; process(); }
        function ignoreWord(w) { ignoredRepeats.add(w.toLowerCase()); autoSave(); process(); }
        function unignoreWord(w) { ignoredRepeats.delete(w); autoSave(); process(); }
        function downloadText() { const blob = new Blob([textarea.value], { type: 'text/plain' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `script.txt`; a.click(); }
        function copyText() { navigator.clipboard.writeText(textarea.value); }
        function clearText() { if(confirm("Effacer ?")) { textarea.value = ''; process(); } }
        function toggleDarkMode() { document.body.classList.toggle('dark-mode'); localStorage.setItem('purge-dark', document.body.classList.contains('dark-mode')); }
        function toggleShareModal() { document.getElementById('share-modal').style.display = (document.getElementById('share-modal').style.display === 'flex') ? 'none' : 'flex'; }
        async function confirmShare() { const e = document.getElementById('share-email').value.trim().toLowerCase(); const r = document.getElementById('share-role').value; if (!e.includes('@')) return alert("Email invalide"); await db.collection('scripts').doc(currentScriptId).update({ [r]: firebase.firestore.FieldValue.arrayUnion(e) }); document.getElementById('share-email').value = ""; toggleShareModal(); }
        function updateCollaboratorsUI(data) {
            const list = document.getElementById('collaborators-list'); list.innerHTML = ""; const ed = data.editors || []; const vi = data.viewers || [];
            if (ed.length === 0 && vi.length === 0) { document.getElementById('collaborators-section').classList.add('hidden'); return; }
            document.getElementById('collaborators-section').classList.remove('hidden');
            [...ed.map(e=>({e,r:'editors',l:'Éditeur'})), ...vi.map(e=>({e,r:'viewers',l:'Lecteur'}))].forEach(o => {
                const li = document.createElement('li'); li.className = "flex justify-between items-center bg-slate-800/40 p-2 rounded-lg border border-slate-700";
                li.innerHTML = `<div class="flex flex-col"><span class="font-bold">${o.e.split('@')[0]}</span><span class="text-[8px] text-slate-500 uppercase">${o.l}</span></div><button onclick="removeCollaborator('${o.e}', '${o.r}')" class="text-slate-500 hover:text-red-500 px-2">✕</button>`;
                list.appendChild(li);
            });
        }
        async function removeCollaborator(e, r) { if (confirm(`Retirer l'accès à ${e} ?`)) await db.collection('scripts').doc(currentScriptId).update({ [r]: firebase.firestore.FieldValue.arrayRemove(e) }); }
        async function renameCurrentProject() { const n = prompt("Nouveau nom :"); if(n) await db.collection('scripts').doc(currentScriptId).update({ title: n }); }

        window.onload = () => {
            const themes = ['#ef4444', '#f97316', '#eab308', '#84cc16', '#10b981', '#06b6d4', '#2563eb', '#6366f1', '#8b5cf6', '#d946ef', '#ec4899', '#f43f5e'];
            themes.forEach(t => {
                const b = document.createElement('button'); b.className = 'w-4 h-4 rounded-full border border-white/20'; b.style.backgroundColor = t;
                b.onclick = () => { 
                    document.documentElement.style.setProperty('--accent-color', t); 
                    document.getElementById('wpm-slider').style.accentColor = t;
                    process(); 
                };
                document.getElementById('theme-picker').appendChild(b);
            });
            if(localStorage.getItem('purge-dark') === 'true') toggleDarkMode();
            textarea.addEventListener('input', process);
            textarea.addEventListener('scroll', () => highlightLayer.scrollTop = textarea.scrollTop);
        };
    </script>
</body>
</html>
