<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purge-Script Pro | Cloud Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Firebase SDK Compat -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --accent-color: #6366f1; --accent-soft: rgba(99, 102, 241, 0.15); --focus-color: #f02e65; }
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s ease; }
        .editor-font { font-family: 'IBM Plex Sans', sans-serif; font-size: 1.05rem; line-height: 1.6; }
        .editor-container { position: relative; min-height: 600px; border-radius: 1.5rem; background: white; }
        .sync-text { position: absolute; top: 0; left: 0; width: 100%; height: 100%; padding: 30px; white-space: pre-wrap; word-wrap: break-word; overflow-y: auto; border: none; margin: 0; background: transparent; }
        #textarea { color: transparent; caret-color: #1e293b; z-index: 2; resize: none; outline: none; }
        #highlight-layer { z-index: 1; pointer-events: none; color: #1e293b; }
        mark { background: none; color: inherit; }
        .show-parasites mark.parasite { background-color: var(--accent-soft); border-bottom: 2px solid var(--accent-color); border-radius: 2px; }
        .show-repeats mark.repeat { background-color: rgba(245, 158, 11, 0.15); border-bottom: 2px solid #f59e0b; border-radius: 2px; }
        mark.focus-active { background-color: rgba(240, 46, 101, 0.3) !important; border-bottom: 2px solid var(--focus-color) !important; font-weight: 600; }
        .sidebar-item { cursor: pointer; transition: all 0.2s; }
        .sidebar-item:hover { background-color: rgba(255,255,255,0.1); }
        .sidebar-item.active-focus { border: 1px solid var(--focus-color); background-color: rgba(240, 46, 101, 0.2) !important; }
        body.dark-mode { background-color: #0f172a; color: #f1f5f9; }
        .dark-mode .bg-white { background-color: #1e293b; border-color: #334155; }
        .dark-mode .text-slate-900 { color: #f8fafc; }
        .dark-mode .text-slate-500 { color: #94a3b8; }
        .dark-mode .border-slate-200 { border-color: #334155; }
        .dark-mode #highlight-layer { color: #e2e8f0 !important; }
        .dark-mode #textarea { caret-color: #ffffff; }
        .switch { position: relative; display: inline-block; width: 34px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent-color); }
        input:checked + .slider:before { transform: translateX(14px); }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark-mode ::-webkit-scrollbar-thumb { background: #475569; }

        /* Modal sharing */
        #share-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 50; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 2rem; border-radius: 1.5rem; width: 100%; max-width: 400px; }
        .dark-mode .modal-content { background: #1e293b; color: white; }
    </style>
</head>
<body class="text-slate-800 bg-slate-50">

    <!-- Modal Partage -->
    <div id="share-modal">
        <div class="modal-content shadow-2xl border border-slate-200 dark:border-slate-700">
            <h3 class="text-lg font-bold mb-4">Partager le script</h3>
            <p class="text-xs text-slate-500 mb-4">Entrez l'email d'un utilisateur pour lui donner accès.</p>
            <input type="email" id="share-email" placeholder="email@exemple.com" class="w-full p-3 rounded-xl border mb-3 dark:bg-slate-800 dark:border-slate-600 outline-none">
            <select id="share-role" class="w-full p-3 rounded-xl border mb-6 dark:bg-slate-800 dark:border-slate-600">
                <option value="editor">Éditeur (Peut modifier)</option>
                <option value="viewer">Lecteur (Lecture seule)</option>
            </select>
            <div class="flex gap-3">
                <button onclick="confirmShare()" class="flex-1 bg-indigo-500 text-white py-3 rounded-xl font-bold text-sm">Inviter</button>
                <button onclick="toggleShareModal()" class="flex-1 bg-slate-200 dark:bg-slate-700 py-3 rounded-xl font-bold text-sm">Fermer</button>
            </div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto px-6 py-10">
        
        <header class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-10 border-b border-slate-200 dark:border-slate-700 pb-8">
            <div>
                <div class="flex items-center gap-3">
                    <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Purge-Script<span class="text-[var(--accent-color)]">.</span></h1>
                    <span id="save-status" class="text-[10px] uppercase font-bold text-green-500 opacity-0 transition-opacity">Synchronisé</span>
                </div>
                <div class="flex items-center gap-2 mt-1">
                    <p class="text-slate-500 text-sm font-medium italic">Intervalle : 70 mots | <span id="user-display">Mode Local</span></p>
                </div>
            </div>

            <div class="flex flex-wrap items-center gap-4">
                <!-- Boutons de gestion -->
                <button id="share-btn" onclick="toggleShareModal()" class="hidden items-center gap-2 px-4 py-2 bg-indigo-100 text-indigo-600 rounded-xl text-xs font-bold hover:scale-105 transition">
                    Partager
                </button>

                <button id="auth-btn" onclick="handleAuth()" class="flex items-center gap-2 px-4 py-2 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl text-xs font-bold shadow-sm hover:scale-105 transition">
                    <span id="auth-btn-text">Se connecter (Cloud)</span>
                </button>

                <div class="flex gap-4 bg-white dark:bg-slate-800 p-3 rounded-2xl border border-slate-200 shadow-sm text-xs font-bold uppercase">
                    <div class="flex items-center gap-2"><span>Tics</span><label class="switch"><input type="checkbox" id="toggle-parasites" checked onchange="process()"><span class="slider"></span></label></div>
                    <div class="flex items-center gap-2 border-l pl-4 border-slate-200"><span>Répé.</span><label class="switch"><input type="checkbox" id="toggle-repeats" checked onchange="process()"><span class="slider"></span></label></div>
                </div>

                <div class="bg-white dark:bg-slate-800 p-3 rounded-2xl shadow-sm border border-slate-200 flex items-center gap-4">
                    <button onclick="toggleDarkMode()" class="p-2.5 rounded-xl bg-slate-100 dark:bg-slate-700 hover:scale-105 transition">
                        <svg id="sun-icon" class="w-5 h-5 hidden text-yellow-400" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"></path></svg>
                        <svg id="moon-icon" class="w-5 h-5 text-slate-600" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
                    </button>
                    <div class="h-8 w-[1px] bg-slate-200 dark:bg-slate-700"></div>
                    <div class="flex flex-wrap gap-1.5 max-w-[200px]" id="theme-picker"></div>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-12 grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="bg-white dark:bg-slate-800 p-5 rounded-3xl border border-slate-200 shadow-sm">
                    <p class="text-slate-400 text-[10px] font-bold uppercase mb-1">Tics</p>
                    <p id="total-parasites" class="text-2xl font-extrabold text-indigo-500">0</p>
                </div>
                <div class="bg-white dark:bg-slate-800 p-5 rounded-3xl border border-slate-200 shadow-sm">
                    <p class="text-slate-400 text-[10px] font-bold uppercase mb-1">Répétitions</p>
                    <p id="total-repeats" class="text-2xl font-extrabold text-amber-500">0</p>
                </div>
                <div class="bg-white dark:bg-slate-800 p-5 rounded-3xl border border-slate-200 shadow-sm">
                    <p class="text-slate-400 text-[10px] font-bold uppercase mb-1">Total Mots</p>
                    <p id="total-words" class="text-2xl font-extrabold">0</p>
                </div>
                <div class="bg-white dark:bg-slate-800 p-5 rounded-3xl border border-slate-200 shadow-sm border-l-4 border-l-slate-800">
                    <p class="text-slate-400 text-[10px] font-bold uppercase mb-1">Focus Actif</p>
                    <p id="focus-display" class="text-xl font-extrabold text-zinc-300">Aucun</p>
                </div>
            </div>

            <div class="lg:col-span-8 space-y-4">
                <div id="editor-wrapper" class="editor-container border border-slate-200 shadow-sm overflow-hidden bg-white show-parasites show-repeats">
                    <div id="highlight-layer" class="sync-text editor-font"></div>
                    <textarea id="textarea" class="sync-text editor-font" placeholder="Commencez à écrire..." spellcheck="false"></textarea>
                </div>
                <div class="flex gap-4">
                    <button onclick="copyText()" class="bg-[var(--accent-color)] text-white px-8 py-3.5 rounded-2xl font-bold shadow-lg uppercase text-xs tracking-widest hover:scale-105 transition">Copier</button>
                    <button onclick="downloadText()" class="bg-slate-900 text-white px-8 py-3.5 rounded-2xl font-bold shadow-lg uppercase text-xs tracking-widest hover:scale-105 transition">Exporter .txt</button>
                    <button onclick="clearText()" class="text-slate-400 hover:text-red-500 font-bold transition text-xs uppercase px-4">Effacer</button>
                </div>
            </div>

            <div class="lg:col-span-4 space-y-6">
                <div class="bg-slate-900 text-white p-7 rounded-[2rem] shadow-xl space-y-8">
                    <div><h2 class="text-[9px] font-bold uppercase tracking-widest text-slate-500 mb-4">Tics</h2><ul id="word-list" class="space-y-1 max-h-40 overflow-y-auto pr-2 text-[11px]"></ul></div>
                    <div><h2 class="text-[9px] font-bold uppercase tracking-widest text-slate-500 mb-4">Répétitions</h2><ul id="repeat-list" class="space-y-1 max-h-40 overflow-y-auto pr-2 text-[11px]"></ul></div>
                    
                    <!-- Scripts partagés avec moi -->
                    <div id="shared-scripts-container" class="hidden border-t border-slate-700 pt-6">
                        <h2 class="text-[9px] font-bold uppercase tracking-widest text-slate-500 mb-4">Scripts partagés avec moi</h2>
                        <ul id="shared-list" class="space-y-2 text-[11px]"></ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCPI5JRtaODgMbhpvmb5jJ9pGaEOFms8sI",
            authDomain: "script-p-6c6df.firebaseapp.com",
            projectId: "script-p-6c6df",
            storageBucket: "script-p-6c6df.firebasestorage.app",
            messagingSenderId: "792026086516",
            appId: "1:792026086516:web:cf2882d0bd6e770db7a521"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const parasiteDictionary = ["du coup", "en fait", "voilà", "un petit peu", "euh", "globalement", "concrètement", "effectivement", "donc", "c'est-à-dire", "au final", "disons que", "typiquement", "clairement", "tout simplement", "en gros", "pour le coup", "un peu", "voilà quoi", "tu vois", "franchement", "honnêtement", "en réalité", "pour ainsi dire", "alors", "en quelque sorte", "justement", "au niveau de", "quelque part", "on va dire", "fondamentalement", "véritablement", "pour ma part", "en soi", "entre guillemets", "si vous voulez", "de base", "sur la fin"];
        const stopWords = ["je", "me", "moi", "tu", "te", "toi", "il", "elle", "on", "nous", "vous", "ils", "elles", "le", "la", "les", "un", "une", "des", "du", "de", "ce", "cet", "cette", "ces", "se", "soi", "lui", "leur", "y", "en", "mon", "ton", "son", "ma", "ta", "sa", "mes", "tes", "ses", "notre", "votre", "nos", "vos", "leurs", "qui", "que", "quoi", "dont", "où", "quel", "quels", "quelle", "quelles", "et", "ou", "mais", "est", "sont", "pour", "dans", "par", "avec", "pas", "ne", "si", "ici", "là", "ont", "aux", "très"];

        let activeFocusWord = null;
        let currentUser = null;
        let currentScriptId = null;
        let userRole = 'owner'; // 'owner', 'editor', 'viewer'

        const textarea = document.getElementById('textarea');
        const highlightLayer = document.getElementById('highlight-layer');
        const editorWrapper = document.getElementById('editor-wrapper');

        // GESTION AUTH ET CHARGEMENT
        function handleAuth() {
            if (currentUser) { auth.signOut(); } 
            else { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
        }

        auth.onAuthStateChanged(async user => {
            currentUser = user;
            const btnText = document.getElementById('auth-btn-text');
            const display = document.getElementById('user-display');
            const shareBtn = document.getElementById('share-btn');
            const sharedSection = document.getElementById('shared-scripts-container');

            if (user) {
                btnText.innerText = "Se déconnecter";
                display.innerText = "Connecté : " + user.displayName;
                shareBtn.classList.remove('hidden');
                sharedSection.classList.remove('hidden');
                
                currentScriptId = user.uid; // Par défaut, son propre script
                loadScript(currentScriptId);
                fetchSharedScripts();
            } else {
                btnText.innerText = "Se connecter (Cloud)";
                display.innerText = "Mode Local";
                shareBtn.classList.add('hidden');
                sharedSection.classList.add('hidden');
                textarea.readOnly = false;
                textarea.value = localStorage.getItem('purge-content') || "";
                process();
            }
        });

        // CHARGEMENT D'UN SCRIPT SPECIFIQUE
        async function loadScript(id) {
            currentScriptId = id;
            const doc = await db.collection('scripts').doc(id).get();
            
            if (doc.exists) {
                const data = doc.data();
                textarea.value = data.content;
                
                // Vérifier rôle
                if (data.owner === currentUser.uid) {
                    userRole = 'owner';
                } else {
                    userRole = data.collaborators[currentUser.email] || 'viewer';
                }
            } else if (id === currentUser.uid) {
                // Créer le script personnel s'il n'existe pas
                await db.collection('scripts').doc(id).set({
                    content: textarea.value,
                    owner: currentUser.uid,
                    ownerEmail: currentUser.email,
                    collaborators: {}
                });
                userRole = 'owner';
            }

            textarea.readOnly = (userRole === 'viewer');
            process();
        }

        // CHERCHER LES SCRIPTS PARTAGÉS
        async function fetchSharedScripts() {
            const list = document.getElementById('shared-list');
            list.innerHTML = "";
            const snapshot = await db.collection('scripts')
                .where(`collaborators.${currentUser.email.replace(/\./g, '_')}`, 'in', ['editor', 'viewer'])
                .get();
            
            // Note: Firestore n'aime pas les points dans les clés, on utilise un hack ou une structure différente.
            // Pour faire simple ici, on cherche tous les scripts où l'utilisateur est présent dans un objet "access"
            const allShared = await db.collection('scripts').get();
            allShared.forEach(doc => {
                const data = doc.data();
                if (data.collaborators && data.collaborators[currentUser.email]) {
                    const li = document.createElement('li');
                    li.className = "p-2 bg-slate-800 rounded-lg cursor-pointer hover:bg-indigo-900 transition flex justify-between";
                    li.innerHTML = `<span>Script de ${data.ownerEmail.split('@')[0]}</span> <span class="opacity-50 text-[9px] uppercase">${data.collaborators[currentUser.email]}</span>`;
                    li.onclick = () => loadScript(doc.id);
                    list.appendChild(li);
                }
            });
        }

        // GESTION MODAL PARTAGE
        function toggleShareModal() {
            const m = document.getElementById('share-modal');
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
        }

        async function confirmShare() {
            const email = document.getElementById('share-email').value;
            const role = document.getElementById('share-role').value;
            if (!email) return;

            const scriptRef = db.collection('scripts').doc(currentScriptId);
            await scriptRef.update({
                [`collaborators.${email}`]: role
            });

            alert("Utilisateur invité !");
            toggleShareModal();
        }

        // SAUVEGARDE
        let saveTimeout;
        function autoSave() {
            const content = textarea.value;
            localStorage.setItem('purge-content', content);
            
            if (currentUser && userRole !== 'viewer') {
                clearTimeout(saveTimeout);
                saveTimeout = setTimeout(() => {
                    db.collection('scripts').doc(currentScriptId).update({
                        content: content,
                        lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
                    }).then(() => {
                        const status = document.getElementById('save-status');
                        status.style.opacity = '1';
                        setTimeout(() => status.style.opacity = '0', 2000);
                    });
                }, 1000);
            }
        }

        // --- LOGIQUE ORIGINALE NON TOUCHÉE ---
        function process() {
            const text = textarea.value;
            const showP = document.getElementById('toggle-parasites').checked;
            const showR = document.getElementById('toggle-repeats').checked;
            editorWrapper.classList.toggle('show-parasites', showP);
            editorWrapper.classList.toggle('show-repeats', showR);
            let parasiteIndices = new Set();
            let parasiteCounts = {};
            let totalParasites = 0;
            parasiteDictionary.forEach(word => {
                const regex = new RegExp(`\\b(${word})\\b`, 'gi');
                let match;
                while ((match = regex.exec(text)) !== null) {
                    totalParasites++;
                    parasiteCounts[word.toLowerCase()] = (parasiteCounts[word.toLowerCase()] || 0) + 1;
                    for (let i = 0; i < match[0].length; i++) parasiteIndices.add(match.index + i);
                }
            });
            const wordRegex = /[a-zA-ZàâäéèêëîïôöûüùçÀÂÄÉÈÊËÎÏÔÖÛÜÙÇ]{3,}/g;
            let lastSeenAt = {}; 
            let badRepeatIndices = new Set();
            let repeatCounts = {};
            let wordCounter = 0;
            let match;
            while ((match = wordRegex.exec(text)) !== null) {
                wordCounter++;
                const word = match[0].toLowerCase();
                if (!stopWords.includes(word) && !parasiteIndices.has(match.index)) {
                    if (lastSeenAt[word] && (wordCounter - lastSeenAt[word].count <= 70)) {
                        for (let i = 0; i < word.length; i++) {
                            badRepeatIndices.add(match.index + i);
                            badRepeatIndices.add(lastSeenAt[word].pos + i);
                        }
                        repeatCounts[word] = (repeatCounts[word] || 0) + 1;
                    }
                    lastSeenAt[word] = { count: wordCounter, pos: match.index };
                }
            }
            let focusIndices = new Set();
            if (activeFocusWord) {
                const fRegex = new RegExp(`\\b(${activeFocusWord})\\b`, 'gi');
                let fMatch;
                while ((fMatch = fRegex.exec(text)) !== null) {
                    for (let i = 0; i < fMatch[0].length; i++) focusIndices.add(fMatch.index + i);
                }
            }
            let finalHtml = "";
            let i = 0;
            while (i < text.length) {
                if (focusIndices.has(i)) {
                    finalHtml += `<mark class="focus-active">`;
                    while (i < text.length && focusIndices.has(i)) {
                        finalHtml += text[i].replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
                        i++;
                    }
                    finalHtml += `</mark>`;
                } else if (parasiteIndices.has(i)) {
                    finalHtml += `<mark class="parasite">`;
                    while (i < text.length && parasiteIndices.has(i)) {
                        finalHtml += text[i].replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
                        i++;
                    }
                    finalHtml += `</mark>`;
                } else if (badRepeatIndices.has(i)) {
                    finalHtml += `<mark class="repeat">`;
                    while (i < text.length && badRepeatIndices.has(i)) {
                        finalHtml += text[i].replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
                        i++;
                    }
                    finalHtml += `</mark>`;
                } else {
                    finalHtml += text[i].replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
                    i++;
                }
            }
            highlightLayer.innerHTML = finalHtml + (text.endsWith('\n') ? '\n ' : '');
            document.getElementById('total-parasites').innerText = totalParasites;
            document.getElementById('total-repeats').innerText = Object.keys(repeatCounts).length;
            document.getElementById('total-words').innerText = (text.match(/[a-zA-Zàâäéèêëîïôöûüùç]+/g) || []).length;
            document.getElementById('focus-display').innerText = activeFocusWord || "Aucun";
            updateSidebars(parasiteCounts, repeatCounts);
            syncScroll();
            autoSave();
        }

        function updateSidebars(pCounts, rCounts) {
            const pList = document.getElementById('word-list');
            const rList = document.getElementById('repeat-list');
            pList.innerHTML = Object.entries(pCounts).sort((a,b)=>b[1]-a[1]).map(([w,c])=>`<li onclick="toggleFocus('${w}')" class="sidebar-item ${activeFocusWord===w?'active-focus':''} flex justify-between uppercase font-bold p-2 bg-slate-800/50 rounded-lg mb-1"><span>${w}</span><span class="text-[var(--accent-color)]">${c}</span></li>`).join('') || 'RAS';
            rList.innerHTML = Object.entries(rCounts).sort((a,b)=>b[1]-a[1]).map(([w,c])=>`<li onclick="toggleFocus('${w}')" class="sidebar-item ${activeFocusWord===w?'active-focus':''} flex justify-between uppercase font-bold p-2 bg-slate-800/50 rounded-lg mb-1"><span>${w}</span><span class="text-amber-500">${c+1}x</span></li>`).join('') || 'RAS';
        }

        function toggleFocus(word) { activeFocusWord = (activeFocusWord === word) ? null : word; process(); }
        function downloadText() {
            const blob = new Blob([textarea.value], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `script-${new Date().toLocaleDateString()}.txt`;
            a.click();
        }
        function syncScroll() { highlightLayer.scrollTop = textarea.scrollTop; }
        function copyText() { navigator.clipboard.writeText(textarea.value); }
        function clearText() { if(confirm("Effacer tout le texte ?")) { textarea.value = ''; process(); } }
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('purge-dark', document.body.classList.contains('dark-mode'));
        }

        window.onload = () => {
            const themes = [{ hex: '#ef4444' }, { hex: '#f97316' }, { hex: '#eab308' }, { hex: '#22c55e' }, { hex: '#10b981' }, { hex: '#2563eb' }, { hex: '#06b6d4' }, { hex: '#0ea5e9' }, { hex: '#6366f1' }, { hex: '#d946ef' }, { hex: '#f43f5e' }];
            themes.forEach(t => {
                const b = document.createElement('button');
                b.className = 'w-5 h-5 rounded-full border border-white/20 hover:scale-125 transition';
                b.style.backgroundColor = t.hex;
                b.onclick = () => {
                    document.documentElement.style.setProperty('--accent-color', t.hex);
                    document.documentElement.style.setProperty('--accent-soft', t.hex + '26');
                    process();
                };
                document.getElementById('theme-picker').appendChild(b);
            });
            if(localStorage.getItem('purge-dark') === 'true') toggleDarkMode();
            textarea.addEventListener('input', process);
            textarea.addEventListener('scroll', syncScroll);
            process();
        };
    </script>
</body>
</html>
